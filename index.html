        <tr><td><strong>Cuándo actúa</strong></td><td>Antes del GROUP BY</td><td>Después del GROUP BY</td></tr>
        <tr><td><strong>Filtra</strong></td><td>Filas individuales</td><td>Grupos ya agregados</td></tr>
        <tr><td><strong>Puede usar funciones de agregación</strong></td><td>❌ No</td><td>✅ Sí</td></tr>
        <tr><td><strong>Ejemplo</strong></td><td><code>WHERE "monto" &gt; 50</code></td><td><code>HAVING COUNT(*) &gt; 10</code></td></tr>
      </tbody>
    </table></div>

    <h2>Sintaxis completa con todas las cláusulas</h2>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> columna1, <span class="fn">AGG_FUNC</span>(columna2)
<span class="kw">FROM</span> tabla
<span class="kw">WHERE</span> condicion_filas_individuales
<span class="kw">GROUP BY</span> columna1
<span class="kw">HAVING</span> condicion_agregada;</code></pre>

    <h2>Orden de ejecución con GROUP BY y HAVING</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Paso</th><th>Cláusula</th><th>Qué hace</th></tr></thead>
      <tbody>
        <tr><td>1</td><td><code>FROM</code></td><td>Selecciona la tabla</td></tr>
        <tr><td>2</td><td><code>WHERE</code></td><td>Filtra filas individuales</td></tr>
        <tr><td>3</td><td><code>GROUP BY</code></td><td>Agrupa las filas</td></tr>
        <tr><td>4</td><td>Funciones agregadas</td><td>Calcula SUM, COUNT, AVG… por grupo</td></tr>
        <tr><td>5</td><td><code>HAVING</code></td><td>Filtra los grupos según la agregación</td></tr>
        <tr><td>6</td><td><code>SELECT</code></td><td>Selecciona columnas finales</td></tr>
      </tbody>
    </table></div>
    <div class="callout info">
      <span class="callout-icon">💡</span>
      <p>Regla fácil: <strong>WHERE</strong> filtra filas antes de agrupar · <strong>HAVING</strong> filtra grupos después de agrupar.</p>
    </div>
  </div>
</template>

<!-- ══════════════════════════════════════
     SQL — LECCIÓN 5: RELACIONES ENTRE TABLAS (JOINs)
══════════════════════════════════════ -->
<template id="tpl-sql_joins">
  <div class="topic-header">
    <div class="th-eyebrow">Módulo 5 · SQL · Lección 5</div>
    <div class="th-title">Relaciones entre <em>Tablas</em></div>
    <p class="th-desc">Los JOINs combinan filas de dos o más tablas a partir de una condición. Aprende los 5 tipos: INNER, LEFT, RIGHT, CROSS y FULL JOIN.</p>
  </div>

  <div class="subtab-nav">
    <button class="stab active" data-sub="jn0">Intro a JOINs</button>
    <button class="stab" data-sub="jn1">INNER JOIN</button>
    <button class="stab" data-sub="jn2">LEFT JOIN</button>
    <button class="stab" data-sub="jn3">RIGHT JOIN</button>
    <button class="stab" data-sub="jn4">CROSS JOIN</button>
    <button class="stab" data-sub="jn5">FULL JOIN</button>
  </div>

  <!-- JN0: Intro -->
  <div class="sub-sec on" id="sub-jn0">
    <h2>¿Qué son los JOINs?</h2>
    <p>Los <strong>JOINs</strong> combinan filas de dos o más tablas basándose en una condición relacionada entre ellas. Son imprescindibles en bases de datos relacionales para extraer información que está repartida en varias tablas.</p>

    <h2>Tipos de JOINs</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>JOIN</th><th>Qué devuelve</th></tr></thead>
      <tbody>
        <tr><td><code>INNER JOIN</code></td><td>Solo las filas con <strong>coincidencia en ambas</strong> tablas</td></tr>
        <tr><td><code>LEFT JOIN</code></td><td>Todas las filas de la tabla <strong>izquierda</strong> + coincidencias de la derecha (NULL si no hay)</td></tr>
        <tr><td><code>RIGHT JOIN</code></td><td>Todas las filas de la tabla <strong>derecha</strong> + coincidencias de la izquierda (NULL si no hay)</td></tr>
        <tr><td><code>CROSS JOIN</code></td><td>El <strong>producto cartesiano</strong>: cada fila de la izquierda combinada con cada fila de la derecha</td></tr>
        <tr><td><code>FULL JOIN</code></td><td>Todas las filas de <strong>ambas tablas</strong>, con NULL donde no hay coincidencia</td></tr>
      </tbody>
    </table></div>

    <h2>Orden de ejecución de un JOIN</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Paso</th><th>Cláusula</th><th>Qué hace</th></tr></thead>
      <tbody>
        <tr><td>1</td><td><code>FROM</code></td><td>Selecciona las tablas</td></tr>
        <tr><td>2</td><td><code>ON</code></td><td>Especifica la condición de relación</td></tr>
        <tr><td>3</td><td><code>JOIN</code></td><td>Combina las tablas según el tipo de JOIN</td></tr>
        <tr><td>4</td><td><code>WHERE</code></td><td>Filtra las filas resultantes del JOIN</td></tr>
        <tr><td>5</td><td><code>SELECT</code></td><td>Selecciona las columnas finales</td></tr>
        <tr><td>6</td><td><code>ORDER BY</code> / <code>LIMIT</code></td><td>Ordena y limita los resultados</td></tr>
      </tbody>
    </table></div>
    <div class="callout tip">
      <span class="callout-icon">✅</span>
      <p>Usa <strong>alias</strong> (<code>AS "e"</code>, <code>AS "d"</code>) para hacer las consultas con JOIN más cortas y legibles.</p>
    </div>
  </div>

  <!-- JN1: INNER JOIN -->
  <div class="sub-sec" id="sub-jn1">
    <h2>INNER JOIN</h2>
    <p>Devuelve <strong>solo las filas con coincidencia en ambas tablas</strong>. Excluye cualquier fila sin coincidencia en alguna de ellas. Es el tipo de JOIN más usado.</p>

    <h2>Sintaxis</h2>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> tabla1.columna1, tabla2.columna2
<span class="kw">FROM</span> tabla1
<span class="kw">INNER JOIN</span> tabla2
<span class="kw">ON</span> tabla1.columna_relacionada = tabla2.columna_relacionada;</code></pre>

    <h2>Ejemplo: empleados con departamento asignado</h2>
    <p>Solo devuelve los empleados que tienen un departamento asignado — los empleados sin departamento quedan excluidos:</p>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="str">"e"</span>.<span class="str">"nombre"</span>, <span class="str">"d"</span>.<span class="str">"nombre"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span> <span class="kw">AS</span> <span class="str">"e"</span>
<span class="kw">INNER JOIN</span> <span class="str">"departamentos"</span> <span class="kw">AS</span> <span class="str">"d"</span>
<span class="kw">ON</span> <span class="str">"e"</span>.<span class="str">"departamento_id"</span> = <span class="str">"d"</span>.<span class="str">"id"</span>;</code></pre>

    <div class="callout info">
      <span class="callout-icon">💡</span>
      <p><strong>INNER JOIN</strong> = intersección. Solo los registros que existen en <em>ambas</em> tablas aparecen en el resultado.</p>
    </div>
  </div>

  <!-- JN2: LEFT JOIN -->
  <div class="sub-sec" id="sub-jn2">
    <h2>LEFT JOIN</h2>
    <p>Devuelve <strong>todas las filas de la tabla izquierda</strong> (la del FROM) más las filas coincidentes de la derecha. Si no hay coincidencia en la derecha, las columnas de esa tabla se rellenan con <code>NULL</code>.</p>

    <h2>Sintaxis</h2>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> tabla1.columna1, tabla2.columna2
<span class="kw">FROM</span> tabla1
<span class="kw">LEFT JOIN</span> tabla2
<span class="kw">ON</span> tabla1.columna_relacionada = tabla2.columna_relacionada;</code></pre>

    <h2>Ejemplo: todos los empleados, tengan o no departamento</h2>
    <p>Los empleados sin departamento asignado aparecerán con <code>NULL</code> en la columna del departamento:</p>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="str">"e"</span>.<span class="str">"nombre"</span>, <span class="str">"d"</span>.<span class="str">"nombre"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span> <span class="kw">AS</span> <span class="str">"e"</span>
<span class="kw">LEFT JOIN</span> <span class="str">"departamentos"</span> <span class="kw">AS</span> <span class="str">"d"</span>
<span class="kw">ON</span> <span class="str">"e"</span>.<span class="str">"departamento_id"</span> = <span class="str">"d"</span>.<span class="str">"id"</span>;</code></pre>

    <div class="callout tip">
      <span class="callout-icon">✅</span>
      <p><strong>LEFT JOIN</strong> es ideal en informes donde necesitas <em>todos</em> los registros de la tabla principal, independientemente de si tienen datos relacionados en la otra tabla.</p>
    </div>
  </div>

  <!-- JN3: RIGHT JOIN -->
  <div class="sub-sec" id="sub-jn3">
    <h2>RIGHT JOIN</h2>
    <p>Es el opuesto al LEFT JOIN: devuelve <strong>todas las filas de la tabla derecha</strong> más las coincidencias de la izquierda. Si no hay coincidencia en la izquierda, esas columnas se rellenan con <code>NULL</code>.</p>

    <h2>Sintaxis</h2>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> tabla1.columna, tabla2.columna
<span class="kw">FROM</span> tabla1
<span class="kw">RIGHT JOIN</span> tabla2
<span class="kw">ON</span> tabla1.columna_comun = tabla2.columna_comun;</code></pre>

    <h2>Ejemplo: todos los departamentos, tengan o no empleados</h2>
    <p>Aunque en el FROM ponemos "empleados", el RIGHT JOIN garantiza que aparezcan todos los departamentos, incluso los que no tienen ningún empleado asignado:</p>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="str">"empleados"</span>.<span class="str">"nombre"</span>, <span class="str">"departamentos"</span>.<span class="str">"nombre_departamento"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>
<span class="kw">RIGHT JOIN</span> <span class="str">"departamentos"</span>
<span class="kw">ON</span> <span class="str">"empleados"</span>.<span class="str">"departamento_id"</span> = <span class="str">"departamentos"</span>.<span class="str">"id"</span>;</code></pre>

    <div class="callout info">
      <span class="callout-icon">💡</span>
      <p>Un <strong>RIGHT JOIN</strong> equivale a un <strong>LEFT JOIN</strong> con las tablas en orden inverso. En la práctica, se usa LEFT JOIN con más frecuencia.</p>
    </div>
  </div>

  <!-- JN4: CROSS JOIN -->
  <div class="sub-sec" id="sub-jn4">
    <h2>CROSS JOIN</h2>
    <p>Devuelve el <strong>producto cartesiano</strong> de las dos tablas: cada fila de la primera tabla se combina con <em>cada</em> fila de la segunda. No requiere condición <code>ON</code>.</p>
    <p>Si la tabla A tiene <strong>N filas</strong> y la tabla B tiene <strong>M filas</strong>, el resultado tendrá <strong>N × M filas</strong>.</p>

    <h2>Sintaxis</h2>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> tabla1.columna1, tabla2.columna2
<span class="kw">FROM</span> tabla1
<span class="kw">CROSS JOIN</span> tabla2;</code></pre>

    <h2>Ejemplo: todas las combinaciones de productos y colores</h2>
    <p>Con 5 productos y 3 colores el resultado tiene 5 × 3 = <strong>15 filas</strong>:</p>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="str">"p"</span>.<span class="str">"nombre"</span>, <span class="str">"c"</span>.<span class="str">"color"</span>
<span class="kw">FROM</span> <span class="str">"productos"</span> <span class="kw">AS</span> <span class="str">"p"</span>
<span class="kw">CROSS JOIN</span> <span class="str">"colores"</span> <span class="kw">AS</span> <span class="str">"c"</span>;</code></pre>

    <div class="callout warn">
      <span class="callout-icon">⚠️</span>
      <p>Úsalo con precaución: si las tablas tienen muchas filas, el resultado puede ser <strong>enorme</strong> y difícil de manejar. No hay condición que filtre las combinaciones.</p>
    </div>
  </div>

  <!-- JN5: FULL JOIN -->
  <div class="sub-sec" id="sub-jn5">
    <h2>FULL JOIN (FULL OUTER JOIN)</h2>
    <p>Devuelve <strong>todas las filas de ambas tablas</strong>. Donde no haya coincidencia en una de ellas, las columnas de esa tabla se rellenan con <code>NULL</code>. Es la unión completa de LEFT JOIN y RIGHT JOIN.</p>

    <h2>Sintaxis</h2>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> tabla1.columna1, tabla2.columna2
<span class="kw">FROM</span> tabla1
<span class="kw">FULL JOIN</span> tabla2
<span class="kw">ON</span> tabla1.columna_comun = tabla2.columna_comun;</code></pre>

    <h2>Ejemplo: todos los clientes y todos los pedidos</h2>
    <p>Aparecen clientes sin pedidos (NULL en pedido_id) <em>y</em> pedidos sin cliente registrado (NULL en nombre):</p>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="str">"c"</span>.<span class="str">"nombre"</span>, <span class="str">"p"</span>.<span class="str">"pedido_id"</span>
<span class="kw">FROM</span> <span class="str">"clientes"</span> <span class="kw">AS</span> <span class="str">"c"</span>
<span class="kw">FULL JOIN</span> <span class="str">"pedidos"</span> <span class="kw">AS</span> <span class="str">"p"</span>
<span class="kw">ON</span> <span class="str">"c"</span>.<span class="str">"cliente_id"</span> = <span class="str">"p"</span>.<span class="str">"cliente_id"</span>;</code></pre>

    <div class="callout tip">
      <span class="callout-icon">✅</span>
      <p><strong>FULL JOIN</strong> es ideal cuando necesitas una <em>vista completa</em> de ambas tablas, incluyendo los datos que no tienen correspondencia en ninguno de los dos lados.</p>
    </div>

    <h2>Resumen visual de todos los JOINs</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>JOIN</th><th>Filas tabla izquierda</th><th>Filas tabla derecha</th><th>¿Rellena con NULL?</th></tr></thead>
      <tbody>
        <tr><td><code>INNER JOIN</code></td><td>Solo las que coinciden</td><td>Solo las que coinciden</td><td>No</td></tr>
        <tr><td><code>LEFT JOIN</code></td><td>Todas</td><td>Solo las que coinciden</td><td>Sí, en la derecha</td></tr>
        <tr><td><code>RIGHT JOIN</code></td><td>Solo las que coinciden</td><td>Todas</td><td>Sí, en la izquierda</td></tr>
        <tr><td><code>CROSS JOIN</code></td><td>Todas × todas</td><td>Todas × todas</td><td>No aplica</td></tr>
        <tr><td><code>FULL JOIN</code></td><td>Todas</td><td>Todas</td><td>Sí, en ambos lados</td></tr>
      </tbody>
    </table></div>
  </div>
</template>

<!-- ══════════════════════════════════════
     SQL — LECCIÓN 6: SUBCONSULTAS
     subtabs: WHERE · EXISTS/NOT EXISTS · SELECT · FROM
══════════════════════════════════════ -->
<template id="tpl-sql_sub">
  <div class="topic-header">
    <div class="th-eyebrow">Módulo 5 · SQL · Lección 6</div>
    <div class="th-title"><em>Subconsultas</em></div>
    <p class="th-desc">Una consulta anidada dentro de otra. Aprende a usarlas en WHERE, EXISTS, SELECT y FROM para construir consultas más complejas y flexibles.</p>
  </div>

  <div class="subtab-nav">
    <button class="stab active" data-sub="sb1">WHERE</button>
    <button class="stab" data-sub="sb2">EXISTS y NOT EXISTS</button>
    <button class="stab" data-sub="sb3">SELECT</button>
    <button class="stab" data-sub="sb4">FROM</button>
  </div>

  <!-- SB1: WHERE -->
  <div class="sub-sec on" id="sub-sb1">
    <h2>¿Qué es una subconsulta?</h2>
    <p>Una <strong>subconsulta</strong> es una consulta anidada dentro de otra. El resultado de la consulta interna se usa como parte de la lógica de la consulta externa. Es especialmente útil cuando necesitamos filtrar, calcular o comparar datos entre tablas de forma dinámica.</p>

    <h2>Subconsultas con WHERE</h2>
    <p>La forma más común: usamos el resultado de la subconsulta como criterio de filtro en el <code>WHERE</code> de la consulta principal.</p>
    <pre><span class="lt">sql</span><code><span class="cm">-- Empleados con salario mayor al promedio de la empresa</span>
<span class="kw">SELECT</span> <span class="str">"nombre"</span>, <span class="str">"salario"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>
<span class="kw">WHERE</span> <span class="str">"salario"</span> > (
    <span class="kw">SELECT</span> <span class="fn">AVG</span>(<span class="str">"salario"</span>)
    <span class="kw">FROM</span> <span class="str">"empleados"</span>
);</code></pre>
    <p>La subconsulta interior calcula el salario promedio, y la consulta exterior filtra los empleados que lo superan.</p>

    <h2>Operadores usables en el WHERE</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Operador</th><th>Cuándo usarlo</th></tr></thead>
      <tbody>
        <tr><td><code>=</code></td><td>La subconsulta devuelve <strong>un único valor</strong></td></tr>
        <tr><td><code>&gt;</code> / <code>&lt;</code></td><td>Comparación numérica con un único valor</td></tr>
        <tr><td><code>IN</code></td><td>La subconsulta devuelve <strong>una lista de valores</strong></td></tr>
        <tr><td><code>NOT IN</code></td><td>Excluir los valores devueltos por la subconsulta</td></tr>
      </tbody>
    </table></div>

    <h2>Buenas prácticas</h2>
    <ul>
      <li><strong>Optimización:</strong> las subconsultas pueden ralentizar la ejecución en grandes volúmenes. Evalúa si un JOIN puede dar el mismo resultado más rápido.</li>
      <li><strong>Legibilidad:</strong> desglosa subconsultas muy largas en partes o usa CTEs (consultas con nombre).</li>
      <li><strong>Operadores adecuados:</strong> usa <code>IN</code> si la subconsulta devuelve múltiples valores, <code>=</code> si devuelve uno solo.</li>
    </ul>
  </div>

  <!-- SB2: EXISTS y NOT EXISTS -->
  <div class="sub-sec" id="sub-sb2">
    <h2>EXISTS</h2>
    <p><code>EXISTS</code> devuelve <code>TRUE</code> si la subconsulta devuelve <strong>al menos una fila</strong>. No le importa qué valores contiene — solo si existen filas. Por convención se escribe <code>SELECT 1</code> dentro:</p>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> columna1, columna2
<span class="kw">FROM</span> tabla1
<span class="kw">WHERE</span> <span class="kw">EXISTS</span> (
  <span class="kw">SELECT</span> <span class="num">1</span>
  <span class="kw">FROM</span> tabla2
  <span class="kw">WHERE</span> tabla1.columnaX = tabla2.columnaY
);</code></pre>

    <h2>NOT EXISTS</h2>
    <p>Devuelve las filas de la consulta principal para las que la subconsulta <strong>no devuelve ninguna fila</strong>. Útil para detectar ausencias:</p>
    <pre><span class="lt">sql</span><code><span class="cm">-- Empleados sin ningún proyecto asignado</span>
<span class="kw">SELECT</span> columna1, columna2
<span class="kw">FROM</span> tabla1
<span class="kw">WHERE</span> <span class="kw">NOT EXISTS</span> (
  <span class="kw">SELECT</span> <span class="num">1</span>
  <span class="kw">FROM</span> tabla2
  <span class="kw">WHERE</span> tabla1.columnaX = tabla2.columnaY
);</code></pre>

    <h2>EXISTS vs IN — ¿Cuándo usar cada uno?</h2>
    <div class="table-wrap"><table>
      <thead><tr><th></th><th>EXISTS / NOT EXISTS</th><th>IN / NOT IN</th></tr></thead>
      <tbody>
        <tr><td><strong>¿Qué comprueba?</strong></td><td>Si existen filas (sí/no)</td><td>Si un valor está en una lista</td></tr>
        <tr><td><strong>Rendimiento en tablas grandes</strong></td><td>✅ Más eficiente (para en la primera coincidencia)</td><td>⚠️ Puede ser más lento</td></tr>
        <tr><td><strong>Detectar ausencias</strong></td><td>✅ Sí, con NOT EXISTS</td><td>⚠️ NOT IN tiene problemas con NULL</td></tr>
        <tr><td><strong>Devuelve valores</strong></td><td>No, solo verifica existencia</td><td>Sí, compara valores concretos</td></tr>
      </tbody>
    </table></div>

    <div class="callout tip">
      <span class="callout-icon">✅</span>
      <p><code>EXISTS</code> es más eficiente que <code>IN</code> en tablas grandes porque detiene la búsqueda en cuanto encuentra la primera coincidencia. Úsalo cuando solo necesitas saber <em>si existe</em> algo, no qué valor tiene.</p>
    </div>
  </div>

  <!-- SB3: SELECT -->
  <div class="sub-sec" id="sub-sb3">
    <h2>Subconsultas en SELECT</h2>
    <p>Permiten <strong>añadir columnas calculadas dinámicamente</strong> a cada fila de la consulta principal. La subconsulta se ejecuta una vez por cada fila y debe devolver <strong>un único valor escalar</strong>.</p>

    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> columna1, columna2,
       (<span class="kw">SELECT</span> valor
        <span class="kw">FROM</span> otra_tabla
        <span class="kw">WHERE</span> condición) <span class="kw">AS</span> alias
<span class="kw">FROM</span> tabla;</code></pre>

    <h2>Ejemplo 1: total de proyectos por empleado</h2>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="str">"empleado_id"</span>, <span class="str">"nombre"</span>,
       (<span class="kw">SELECT</span> <span class="fn">COUNT</span>(*)
        <span class="kw">FROM</span> <span class="str">"proyectos"</span>
        <span class="kw">WHERE</span> <span class="str">"proyectos"</span>.<span class="str">"empleado_id"</span> = <span class="str">"empleados"</span>.<span class="str">"empleado_id"</span>
       ) <span class="kw">AS</span> <span class="str">"total_proyectos"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>;</code></pre>

    <h2>Ejemplo 2: duración del proyecto más largo por empleado</h2>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="str">"empleado_id"</span>, <span class="str">"nombre"</span>,
       (<span class="kw">SELECT</span> <span class="fn">MAX</span>(<span class="str">"duración"</span>)
        <span class="kw">FROM</span> <span class="str">"proyectos"</span>
        <span class="kw">WHERE</span> <span class="str">"proyectos"</span>.<span class="str">"empleado_id"</span> = <span class="str">"empleados"</span>.<span class="str">"empleado_id"</span>
       ) <span class="kw">AS</span> <span class="str">"proyecto_más_largo"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>;</code></pre>

    <div class="callout warn">
      <span class="callout-icon">⚠️</span>
      <p>La subconsulta en <code>SELECT</code> <strong>debe devolver exactamente un valor</strong> por fila. Si devuelve más de uno, SQL lanzará un error. Si puede devolver múltiples filas, usa <code>JOIN</code> en su lugar.</p>
    </div>
    <div class="callout info">
      <span class="callout-icon">💡</span>
      <p><strong>Rendimiento:</strong> la subconsulta se ejecuta una vez por cada fila de la consulta principal. En tablas grandes puede ser lento — considera optimizar con <code>JOIN</code> o índices.</p>
    </div>
  </div>

  <!-- SB4: FROM -->
  <div class="sub-sec" id="sub-sb4">
    <h2>Subconsultas en FROM</h2>
    <p>El resultado de la subconsulta se trata como una <strong>tabla temporal</strong> sobre la que se pueden hacer operaciones adicionales. Es fundamental asignarle un <strong>alias</strong>.</p>

    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> columna1, columna2
<span class="kw">FROM</span> (
    <span class="kw">SELECT</span> columnaX, columnaY
    <span class="kw">FROM</span> otra_tabla
    <span class="kw">WHERE</span> condición
) <span class="kw">AS</span> alias
<span class="kw">WHERE</span> condición_adicional;</code></pre>

    <h2>Ejemplo 1: promedio de ventas de productos con más de 100 ventas</h2>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="str">"producto_id"</span>, <span class="fn">AVG</span>(<span class="str">"total_ventas"</span>)
<span class="kw">FROM</span> (
    <span class="kw">SELECT</span> <span class="str">"producto_id"</span>, <span class="fn">SUM</span>(<span class="str">"cantidad"</span>) <span class="kw">AS</span> <span class="str">"total_ventas"</span>
    <span class="kw">FROM</span> <span class="str">"ventas"</span>
    <span class="kw">GROUP BY</span> <span class="str">"producto_id"</span>
) <span class="kw">AS</span> <span class="str">"ventas_agrupadas"</span>
<span class="kw">WHERE</span> <span class="str">"total_ventas"</span> > <span class="num">100</span>
<span class="kw">GROUP BY</span> <span class="str">"producto_id"</span>;</code></pre>

    <h2>Ejemplo 2: empleados con más de 3 proyectos</h2>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="str">"empleado_id"</span>, <span class="str">"nombre"</span>, <span class="str">"total_proyectos"</span>
<span class="kw">FROM</span> (
    <span class="kw">SELECT</span> <span class="str">"empleado_id"</span>, <span class="fn">COUNT</span>(<span class="str">"proyecto_id"</span>) <span class="kw">AS</span> <span class="str">"total_proyectos"</span>
    <span class="kw">FROM</span> <span class="str">"proyectos"</span>
    <span class="kw">GROUP BY</span> <span class="str">"empleado_id"</span>
) <span class="kw">AS</span> <span class="str">"proyectos_agrupados"</span>
<span class="kw">JOIN</span> <span class="str">"empleados"</span>
  <span class="kw">ON</span> <span class="str">"empleados"</span>.<span class="str">"empleado_id"</span> = <span class="str">"proyectos_agrupados"</span>.<span class="str">"empleado_id"</span>
<span class="kw">WHERE</span> <span class="str">"total_proyectos"</span> > <span class="num">3</span>;</code></pre>

    <h2>Ventajas de las subconsultas en FROM</h2>
    <ul>
      <li><strong>Organización:</strong> descomponen consultas largas en partes más manejables y legibles.</li>
      <li><strong>Filtrado intermedio:</strong> permiten agrupar, sumar o filtrar datos antes de aplicar la lógica principal.</li>
      <li><strong>Alias obligatorio:</strong> siempre debes asignar un alias a la subconsulta para poder referenciarla.</li>
    </ul>

    <div class="callout info">
      <span class="callout-icon">💡</span>
      <p>Las subconsultas en <code>FROM</code> también se llaman <strong>tablas derivadas</strong>. Son una alternativa a las vistas cuando no necesitas guardar la consulta de forma permanente.</p>
    </div>

    <h2>Resumen: dónde usar cada tipo de subconsulta</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Ubicación</th><th>Para qué sirve</th><th>Devuelve</th></tr></thead>
      <tbody>
        <tr><td><code>WHERE</code></td><td>Filtrar filas según el resultado de otra consulta</td><td>Un valor o lista de valores</td></tr>
        <tr><td><code>EXISTS</code></td><td>Verificar si existen filas que cumplan una condición</td><td>TRUE / FALSE</td></tr>
        <tr><td><code>SELECT</code></td><td>Añadir una columna calculada dinámicamente</td><td>Un único valor escalar por fila</td></tr>
        <tr><td><code>FROM</code></td><td>Tratar el resultado como una tabla temporal</td><td>Una tabla completa (con alias)</td></tr>
      </tbody>
    </table></div>
  </div>
</template>

<!-- ══════════════════════════════════════
     SQL — LECCIÓN 7: VISTAS
══════════════════════════════════════ -->
<template id="tpl-sql_vistas">
  <div class="topic-header">
    <div class="th-eyebrow">Módulo 5 · SQL · Lección 7</div>
    <div class="th-title">Estructuras Persistentes: <em>Vistas</em></div>
    <p class="th-desc">Una vista es una consulta guardada en la base de datos que actúa como una tabla virtual. Simplifica el acceso a datos complejos sin almacenar información duplicada.</p>
  </div>

  <h2>¿Qué es una vista?</h2>
  <p>Una <strong>vista</strong> es una consulta predefinida almacenada en la base de datos que actúa como una <strong>tabla virtual</strong>. A diferencia de las tablas físicas, <strong>no almacena datos</strong>: genera su contenido dinámicamente cada vez que la consultas, ejecutando la consulta asociada.</p>

  <div class="callout info">
    <span class="callout-icon">💡</span>
    <p>Piensa en una vista como un <strong>acceso directo</strong> a una consulta compleja. En lugar de reescribirla cada vez, la llamas por su nombre como si fuera una tabla.</p>
  </div>

  <h2>Crear una vista</h2>
  <pre><span class="lt">sql</span><code><span class="kw">CREATE VIEW</span> nombre_vista <span class="kw">AS</span>
<span class="kw">SELECT</span> columna1, columna2
<span class="kw">FROM</span> tabla
<span class="kw">WHERE</span> condición;</code></pre>

  <h2>Ejemplo: clientes activos</h2>
  <p>Creamos una vista con los nombres y correos de los clientes que están activos:</p>
  <pre><span class="lt">sql</span><code><span class="cm">-- 1. Crear la vista</span>
<span class="kw">CREATE VIEW</span> vista_clientes_activos <span class="kw">AS</span>
<span class="kw">SELECT</span> <span class="str">"nombre"</span>, <span class="str">"email"</span>
<span class="kw">FROM</span> <span class="str">"clientes"</span>
<span class="kw">WHERE</span> <span class="str">"activo"</span> = <span class="builtin">TRUE</span>;

<span class="cm">-- 2. Consultarla como si fuera una tabla normal</span>
<span class="kw">SELECT</span> *
<span class="kw">FROM</span> vista_clientes_activos;</code></pre>
  <p>La segunda consulta obtiene todos los clientes activos sin necesidad de repetir la lógica de selección y filtrado.</p>

  <h2>Ventajas de las vistas</h2>
  <div class="table-wrap"><table>
    <thead><tr><th>#</th><th>Ventaja</th><th>Qué significa en la práctica</th></tr></thead>
    <tbody>
      <tr><td>1</td><td><strong>Simplificación</strong></td><td>Encapsula consultas con múltiples JOINs o condiciones en una sola línea</td></tr>
      <tr><td>2</td><td><strong>Seguridad</strong></td><td>Limita el acceso a columnas o filas sensibles sin exponer la tabla original</td></tr>
      <tr><td>3</td><td><strong>Mantenimiento fácil</strong></td><td>Si la lógica cambia, solo actualizas la vista, no todos los scripts que la usan</td></tr>
      <tr><td>4</td><td><strong>Reutilización</strong></td><td>Una misma vista puede usarse en múltiples consultas sin duplicar código</td></tr>
      <tr><td>5</td><td><strong>Abstracción</strong></td><td>Oculta la complejidad de la estructura interna y presenta una interfaz más sencilla</td></tr>
      <tr><td>6</td><td><strong>Optimización</strong></td><td>Algunas BBDD permiten <em>vistas materializadas</em> que guardan el resultado temporalmente para mejorar el rendimiento</td></tr>
    </tbody>
  </table></div>

  <h2>Vista vs Subconsulta en FROM</h2>
  <div class="table-wrap"><table>
    <thead><tr><th></th><th>Vista</th><th>Subconsulta en FROM</th></tr></thead>
    <tbody>
      <tr><td><strong>Se guarda en la BD</strong></td><td>✅ Sí, de forma permanente</td><td>❌ No, solo existe durante la consulta</td></tr>
      <tr><td><strong>Reutilizable</strong></td><td>✅ Sí, por cualquier consulta</td><td>❌ Solo en esa consulta</td></tr>
      <tr><td><strong>Requiere nombre</strong></td><td>✅ Nombre permanente</td><td>✅ Alias temporal obligatorio</td></tr>
      <tr><td><strong>Almacena datos</strong></td><td>❌ No (salvo vistas materializadas)</td><td>❌ No</td></tr>
    </tbody>
  </table></div>

  <div class="callout tip">
    <span class="callout-icon">✅</span>
    <p>Usa una <strong>vista</strong> cuando vayas a reutilizar la misma consulta compleja varias veces. Usa una <strong>subconsulta en FROM</strong> cuando solo la necesites una vez dentro de una consulta concreta.</p>
  </div>
</template>

<!-- ══════════════════════════════════════
     SQL — LECCIÓN 8: ESTRUCTURAS DE DATOS TEMPORALES
     subtabs: CTEs Intro · CTEs antes del SELECT · CTEs en subconsultas · CTEs entre SELECTs · Tablas temporales
══════════════════════════════════════ -->
<template id="tpl-sql_temp">
  <div class="topic-header">
    <div class="th-eyebrow">Módulo 5 · SQL · Lección 8</div>
    <div class="th-title">Estructuras de Datos <em>Temporales</em></div>
    <p class="th-desc">CTEs y tablas temporales: herramientas para organizar consultas complejas, reutilizar resultados intermedios y almacenar datos durante una sesión.</p>
  </div>

  <div class="subtab-nav">
    <button class="stab active" data-sub="tp1">CTEs — Intro</button>
    <button class="stab" data-sub="tp2">CTEs antes del SELECT</button>
    <button class="stab" data-sub="tp3">CTEs en subconsultas</button>
    <button class="stab" data-sub="tp4">CTEs entre dos SELECT</button>
    <button class="stab" data-sub="tp5">Tablas temporales</button>
  </div>

  <!-- TP1: CTEs Intro -->
  <div class="sub-sec on" id="sub-tp1">
    <h2>¿Qué son las CTEs?</h2>
    <p>Las <strong>CTEs</strong> (Common Table Expressions) son tablas temporales creadas en el contexto de una consulta. Solo existen durante su ejecución y permiten organizar consultas complejas en pasos más claros y reutilizables.</p>

    <div class="callout info">
      <span class="callout-icon">💡</span>
      <p>Piensa en una CTE como darle <strong>nombre a una subconsulta</strong> para poder referenciarla después como si fuera una tabla, pero sin guardarla en disco.</p>
    </div>

    <h2>Sintaxis básica</h2>
    <pre><span class="lt">sql</span><code><span class="kw">WITH</span> nombre_cte <span class="kw">AS</span> (
    <span class="kw">SELECT</span> columnas
    <span class="kw">FROM</span> tabla
    <span class="kw">WHERE</span> condición
)
<span class="kw">SELECT</span> columnas
<span class="kw">FROM</span> nombre_cte
<span class="kw">WHERE</span> condición_adicional;</code></pre>

    <h2>Ejemplo: empleados con salario superior al promedio</h2>
    <pre><span class="lt">sql</span><code><span class="kw">WITH</span> salario_promedio <span class="kw">AS</span> (
    <span class="kw">SELECT</span> <span class="fn">AVG</span>(<span class="str">"salario"</span>) <span class="kw">AS</span> <span class="str">"promedio"</span>
    <span class="kw">FROM</span> <span class="str">"empleados"</span>
)
<span class="kw">SELECT</span> <span class="str">"nombre"</span>, <span class="str">"salario"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>
<span class="kw">WHERE</span> <span class="str">"salario"</span> > (<span class="kw">SELECT</span> <span class="str">"promedio"</span> <span class="kw">FROM</span> salario_promedio);</code></pre>

    <h2>Ejemplo: CTE con JOIN entre varias tablas</h2>
    <pre><span class="lt">sql</span><code><span class="kw">WITH</span> empleados_proyectos <span class="kw">AS</span> (
    <span class="kw">SELECT</span> <span class="str">"empleados"</span>.<span class="str">"empleado_id"</span>, <span class="str">"empleados"</span>.<span class="str">"nombre"</span>,
           <span class="str">"proyectos"</span>.<span class="str">"proyecto_id"</span>, <span class="str">"proyectos"</span>.<span class="str">"nombre_proyecto"</span>
    <span class="kw">FROM</span> <span class="str">"empleados"</span>
    <span class="kw">JOIN</span> <span class="str">"asignaciones"</span> <span class="kw">ON</span> <span class="str">"empleados"</span>.<span class="str">"empleado_id"</span> = <span class="str">"asignaciones"</span>.<span class="str">"empleado_id"</span>
    <span class="kw">JOIN</span> <span class="str">"proyectos"</span>    <span class="kw">ON</span> <span class="str">"asignaciones"</span>.<span class="str">"proyecto_id"</span> = <span class="str">"proyectos"</span>.<span class="str">"proyecto_id"</span>
)
<span class="kw">SELECT</span> *
<span class="kw">FROM</span> empleados_proyectos;</code></pre>

    <h2>Ventajas de las CTEs</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Ventaja</th><th>Qué significa</th></tr></thead>
      <tbody>
        <tr><td><strong>Legibilidad</strong></td><td>Divide consultas complejas en pasos intermedios comprensibles</td></tr>
        <tr><td><strong>Sin duplicación</strong></td><td>Define la lógica una vez y reutilízala dentro de la misma consulta</td></tr>
        <tr><td><strong>Sin coste en disco</strong></td><td>No crean tablas físicas, solo existen durante la ejecución</td></tr>
      </tbody>
    </table></div>

    <div class="callout tip">
      <span class="callout-icon">✅</span>
      <p>Usa <strong>nombres descriptivos</strong> para las CTEs para que quede claro qué representan: <code>ventas_totales</code>, <code>empleados_activos</code>, <code>salario_promedio</code>…</p>
    </div>
  </div>

  <!-- TP2: CTEs antes del SELECT -->
  <div class="sub-sec" id="sub-tp2">
    <h2>Múltiples CTEs encadenadas antes del SELECT</h2>
    <p>Podemos definir <strong>varias CTEs</strong> antes del SELECT principal, separadas por comas. Cada CTE puede referenciar a las anteriores, permitiendo construir la lógica paso a paso:</p>

    <pre><span class="lt">sql</span><code><span class="kw">WITH</span> cte1 <span class="kw">AS</span> (
    <span class="cm">-- Paso 1: primera transformación</span>
    <span class="kw">SELECT</span> columnas
    <span class="kw">FROM</span> tabla1
    <span class="kw">WHERE</span> condición
),
cte2 <span class="kw">AS</span> (
    <span class="cm">-- Paso 2: puede usar cte1</span>
    <span class="kw">SELECT</span> columnas
    <span class="kw">FROM</span> cte1
    <span class="kw">WHERE</span> condición
)
<span class="kw">SELECT</span> columnas
<span class="kw">FROM</span> cte2
<span class="kw">WHERE</span> condición_adicional;</code></pre>

    <h2>Caso de uso: ventas totales → filtrar umbral → mostrar nombres</h2>
    <pre><span class="lt">sql</span><code><span class="kw">WITH</span> ventas_por_empleado <span class="kw">AS</span> (
    <span class="cm">-- Paso 1: total vendido por empleado</span>
    <span class="kw">SELECT</span> <span class="str">"empleado_id"</span>, <span class="fn">SUM</span>(<span class="str">"importe"</span>) <span class="kw">AS</span> <span class="str">"total_ventas"</span>
    <span class="kw">FROM</span> <span class="str">"ventas"</span>
    <span class="kw">GROUP BY</span> <span class="str">"empleado_id"</span>
),
empleados_top <span class="kw">AS</span> (
    <span class="cm">-- Paso 2: solo los que superan el umbral</span>
    <span class="kw">SELECT</span> <span class="str">"empleado_id"</span>, <span class="str">"total_ventas"</span>
    <span class="kw">FROM</span> ventas_por_empleado
    <span class="kw">WHERE</span> <span class="str">"total_ventas"</span> > <span class="num">10000</span>
)
<span class="cm">-- Paso 3: unir con empleados para mostrar nombres</span>
<span class="kw">SELECT</span> <span class="str">"e"</span>.<span class="str">"nombre"</span>, <span class="str">"et"</span>.<span class="str">"total_ventas"</span>
<span class="kw">FROM</span> empleados_top <span class="kw">AS</span> <span class="str">"et"</span>
<span class="kw">JOIN</span> <span class="str">"empleados"</span> <span class="kw">AS</span> <span class="str">"e"</span> <span class="kw">ON</span> <span class="str">"e"</span>.<span class="str">"empleado_id"</span> = <span class="str">"et"</span>.<span class="str">"empleado_id"</span>;</code></pre>

    <div class="callout tip">
      <span class="callout-icon">✅</span>
      <p>Las CTEs encadenadas funcionan como una <strong>cadena de pasos</strong>: cada una refina o amplía los datos de la anterior. Es la forma más limpia de abordar transformaciones complejas.</p>
    </div>
  </div>

  <!-- TP3: CTEs en subconsultas -->
  <div class="sub-sec" id="sub-tp3">
    <h2>CTEs al comienzo de una subconsulta</h2>
    <p>También podemos usar CTEs para estructurar los cálculos previos necesarios antes de que la consulta principal procese los datos, combinándolas con subconsultas en <code>WHERE</code>, <code>FROM</code> o <code>SELECT</code>.</p>

    <h2>¿Por qué usar CTEs en subconsultas?</h2>
    <ul>
      <li><strong>Reducen la complejidad:</strong> dividen la consulta en bloques manejables en lugar de anidar subconsultas una dentro de otra.</li>
      <li><strong>Reutilizan resultados intermedios:</strong> el mismo dato intermedio puede usarse en varias partes sin recalcularlo.</li>
      <li><strong>Mejoran la legibilidad:</strong> cada paso tiene nombre y propósito claro.</li>
    </ul>

    <h2>Ejemplo: empleados con más de 50 horas en proyectos</h2>
    <pre><span class="lt">sql</span><code><span class="kw">WITH</span> horas_por_empleado <span class="kw">AS</span> (
    <span class="kw">SELECT</span> <span class="str">"empleado_id"</span>, <span class="fn">SUM</span>(<span class="str">"horas"</span>) <span class="kw">AS</span> <span class="str">"total_horas"</span>
    <span class="kw">FROM</span> <span class="str">"asignaciones"</span>
    <span class="kw">GROUP BY</span> <span class="str">"empleado_id"</span>
)
<span class="kw">SELECT</span> <span class="str">"e"</span>.<span class="str">"nombre"</span>, <span class="str">"h"</span>.<span class="str">"total_horas"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span> <span class="kw">AS</span> <span class="str">"e"</span>
<span class="kw">JOIN</span> horas_por_empleado <span class="kw">AS</span> <span class="str">"h"</span>
  <span class="kw">ON</span> <span class="str">"e"</span>.<span class="str">"empleado_id"</span> = <span class="str">"h"</span>.<span class="str">"empleado_id"</span>
<span class="kw">WHERE</span> <span class="str">"h"</span>.<span class="str">"total_horas"</span> > <span class="num">50</span>;</code></pre>

    <div class="callout info">
      <span class="callout-icon">💡</span>
      <p>Comparado con una subconsulta anidada, la CTE hace que el código sea mucho más fácil de leer, modificar y depurar porque cada parte tiene un nombre descriptivo.</p>
    </div>
  </div>

  <!-- TP4: CTEs entre dos SELECT -->
  <div class="sub-sec" id="sub-tp4">
    <h2>CTEs entre dos SELECT</h2>
    <p>Las CTEs permiten que los resultados de un primer cálculo sean reutilizados en <strong>dos o más SELECT diferentes</strong> dentro de la misma consulta, evitando duplicar la lógica.</p>

    <h2>¿Cuándo usarlas?</h2>
    <p>Cuando los mismos cálculos o filtrados intermedios son necesarios en varias partes de la consulta. En lugar de repetir la subconsulta, la defines una vez como CTE y la referencias desde ambos SELECT.</p>

    <pre><span class="lt">sql</span><code><span class="kw">WITH</span> horas_trabajadas <span class="kw">AS</span> (
    <span class="kw">SELECT</span> <span class="str">"empleado_id"</span>, <span class="fn">SUM</span>(<span class="str">"horas"</span>) <span class="kw">AS</span> <span class="str">"total_horas"</span>
    <span class="kw">FROM</span> <span class="str">"asignaciones"</span>
    <span class="kw">GROUP BY</span> <span class="str">"empleado_id"</span>
)
<span class="cm">-- Primer SELECT: empleados con más de 50 horas</span>
<span class="kw">SELECT</span> <span class="str">"e"</span>.<span class="str">"nombre"</span>, <span class="str">"h"</span>.<span class="str">"total_horas"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span> <span class="kw">AS</span> <span class="str">"e"</span>
<span class="kw">JOIN</span> horas_trabajadas <span class="kw">AS</span> <span class="str">"h"</span> <span class="kw">ON</span> <span class="str">"e"</span>.<span class="str">"empleado_id"</span> = <span class="str">"h"</span>.<span class="str">"empleado_id"</span>
<span class="kw">WHERE</span> <span class="str">"h"</span>.<span class="str">"total_horas"</span> > <span class="num">50</span>

<span class="kw">UNION ALL</span>

<span class="cm">-- Segundo SELECT: todos los empleados con sus horas (sin filtro)</span>
<span class="kw">SELECT</span> <span class="str">"e"</span>.<span class="str">"nombre"</span>, <span class="str">"h"</span>.<span class="str">"total_horas"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span> <span class="kw">AS</span> <span class="str">"e"</span>
<span class="kw">JOIN</span> horas_trabajadas <span class="kw">AS</span> <span class="str">"h"</span> <span class="kw">ON</span> <span class="str">"e"</span>.<span class="str">"empleado_id"</span> = <span class="str">"h"</span>.<span class="str">"empleado_id"</span>;</code></pre>

    <h2>Ventajas</h2>
    <ul>
      <li><strong>Reutilización:</strong> el cálculo de horas se hace una sola vez y se usa en dos consultas distintas.</li>
      <li><strong>Simplicidad:</strong> evita repetir subconsultas idénticas, reduciendo errores.</li>
      <li><strong>Flexibilidad:</strong> cada SELECT puede aplicar condiciones o transformaciones diferentes sobre el mismo conjunto de datos.</li>
    </ul>
  </div>

  <!-- TP5: Tablas temporales -->
  <div class="sub-sec" id="sub-tp5">
    <h2>Tablas temporales</h2>
    <p>Una <strong>tabla temporal</strong> es una tabla que existe durante toda una <strong>sesión de trabajo</strong> (no solo durante una consulta). Se elimina automáticamente cuando la sesión o conexión se cierra.</p>

    <div class="callout info">
      <span class="callout-icon">💡</span>
      <p>A diferencia de las CTEs (que solo viven dentro de una consulta), las tablas temporales persisten durante toda la sesión y pueden ser consultadas por múltiples sentencias SQL.</p>
    </div>

    <h2>Sintaxis de creación</h2>
    <pre><span class="lt">sql</span><code><span class="kw">CREATE TEMPORARY TABLE</span> nombre_tabla_temp <span class="kw">AS</span>
<span class="kw">SELECT</span> columnas
<span class="kw">FROM</span> tabla
<span class="kw">WHERE</span> condición;

<span class="cm">-- Luego puedes consultarla normalmente</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> nombre_tabla_temp;</code></pre>

    <h2>Tipos de tablas temporales</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Tipo</th><th>Visibilidad</th><th>Cuándo se elimina</th></tr></thead>
      <tbody>
        <tr><td><strong>Local</strong></td><td>Solo la sesión que la creó</td><td>Al cerrar esa sesión</td></tr>
        <tr><td><strong>Global</strong></td><td>Todas las sesiones activas</td><td>Cuando todas las sesiones que la usan se cierran</td></tr>
      </tbody>
    </table></div>

    <h2>Ventajas</h2>
    <ul>
      <li><strong>Almacenamiento intermedio:</strong> guarda resultados entre varias consultas de la misma sesión.</li>
      <li><strong>Sesión aislada:</strong> otros usuarios no pueden ver los datos de tu tabla temporal local.</li>
      <li><strong>Eliminación automática:</strong> no necesitas borrarla manualmente al terminar.</li>
      <li><strong>Flexibilidad:</strong> admite SELECT, UPDATE, DELETE como cualquier tabla normal.</li>
    </ul>

    <h2>CTE vs Tabla temporal vs Vista — ¿cuándo usar cada una?</h2>
    <div class="table-wrap"><table>
      <thead><tr><th></th><th>CTE</th><th>Tabla temporal</th><th>Vista</th></tr></thead>
      <tbody>
        <tr><td><strong>Duración</strong></td><td>Solo la consulta actual</td><td>Toda la sesión</td><td>Permanente (hasta borrarla)</td></tr>
        <tr><td><strong>Almacena datos</strong></td><td>❌ No</td><td>✅ Sí</td><td>❌ No (solo la consulta)</td></tr>
        <tr><td><strong>Reutilizable</strong></td><td>Solo en esa consulta</td><td>En toda la sesión</td><td>Por cualquiera con acceso</td></tr>
        <tr><td><strong>Coste en disco</strong></td><td>Ninguno</td><td>Bajo (temporal)</td><td>Ninguno</td></tr>
        <tr><td><strong>Ideal para</strong></td><td>Organizar una consulta compleja</td><td>Cálculos intermedios entre varias consultas</td><td>Consultas reutilizadas habitualmente</td></tr>
      </tbody>
    </table></div>

    <div class="callout tip">
      <span class="callout-icon">✅</span>
      <p><strong>Regla rápida:</strong> usa <strong>CTE</strong> para una consulta → <strong>tabla temporal</strong> para varias consultas en la misma sesión → <strong>vista</strong> para uso recurrente a largo plazo.</p>
    </div>
  </div>
</template>

<!-- ══════════════════════════════════════
     PYTHON — LECCIÓN 2: FUNCIONES
══════════════════════════════════════ -->
<template id="tpl-py_func">
  <div class="topic-header">
    <div class="th-eyebrow">Módulo 4 · Python · Lección 2</div>
    <div class="th-title"><em>Funciones</em></div>
    <p class="th-desc">Bloques de código reutilizables: cómo definirlas, parametrizarlas y usar herramientas avanzadas como lambdas, recursividad, *args, **kwargs y map/filter/reduce.</p>
  </div>

  <div class="subtab-nav">
    <button class="stab active" data-sub="fn1">Intro</button>
    <button class="stab" data-sub="fn2">Variables locales y globales</button>
    <button class="stab" data-sub="fn3">Sin parámetros</button>
    <button class="stab" data-sub="fn4">Con parámetros</button>
    <button class="stab" data-sub="fn5">Parámetro por defecto</button>
    <button class="stab" data-sub="fn6">*args y **kwargs</button>
    <button class="stab" data-sub="fn7">Recursividad</button>
    <button class="stab" data-sub="fn8">Lambdas</button>
    <button class="stab" data-sub="fn9">map · filter · reduce</button>
  </div>

  <!-- FN1: Intro -->
  <div class="sub-sec on" id="sub-fn1">
    <h2>¿Qué es una función?</h2>
    <p>Una <strong>función</strong> es un bloque de código que se puede llamar para realizar una tarea específica. El código dentro de una función <strong>solo se ejecuta cuando la llamamos</strong>: primero la definimos y luego la invocamos.</p>

    <h2>¿Por qué usar funciones?</h2>
    <ul>
      <li><strong>Reutilización:</strong> en lugar de repetir el mismo bloque de código, llamamos a la función cada vez que la necesitemos.</li>
      <li><strong>Mantenimiento:</strong> si hay un error o un cambio, solo lo corregimos en un sitio: dentro de la función.</li>
      <li><strong>Claridad:</strong> nombres descriptivos hacen el código más legible y organizado.</li>
      <li><strong>Modularidad:</strong> dividimos procesos complejos en pasos más pequeños y manejables.</li>
    </ul>

    <h2>Componentes de una función</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Componente</th><th>Descripción</th><th>Obligatorio</th></tr></thead>
      <tbody>
        <tr><td><code>def</code></td><td>Palabra clave que inicia la definición</td><td>✅ Sí</td></tr>
        <tr><td>Nombre</td><td>Nombre descriptivo e intuitivo</td><td>✅ Sí</td></tr>
        <tr><td>Paréntesis <code>()</code></td><td>Contienen los parámetros (pueden ir vacíos)</td><td>✅ Sí</td></tr>
        <tr><td>Parámetros</td><td>Datos que recibe la función</td><td>❌ Opcional</td></tr>
        <tr><td><code>return</code></td><td>Devuelve un valor al punto de llamada</td><td>❌ Opcional</td></tr>
        <tr><td>Docstring <code>"""..."""</code></td><td>Documenta el comportamiento, parámetros y return</td><td>❌ Opcional (recomendado)</td></tr>
      </tbody>
    </table></div>

    <pre><span class="lt">python</span><code><span class="kw">def</span> <span class="fn">numero_cuadrado</span>(<span class="var">numero</span>):
    <span class="kw">return</span> <span class="var">numero</span> ** <span class="num">2</span>

<span class="var">resultado</span> = <span class="fn">numero_cuadrado</span>(<span class="num">5</span>)
<span class="fn">print</span>(<span class="var">resultado</span>)  <span class="cm"># 25</span></code></pre>

    <div class="callout tip">
      <span class="callout-icon">✅</span>
      <p>En VSCode existe la extensión <strong>autoDocstring</strong> (Python Docstring Generator) que genera automáticamente la documentación de tus funciones.</p>
    </div>
  </div>

  <!-- FN2: Variables locales y globales -->
  <div class="sub-sec" id="sub-fn2">
    <h2>Variable global vs variable local</h2>
    <div class="table-wrap"><table>
      <thead><tr><th></th><th>Variable global</th><th>Variable local</th></tr></thead>
      <tbody>
        <tr><td><strong>Dónde se define</strong></td><td>Fuera de cualquier función</td><td>Dentro de una función</td></tr>
        <tr><td><strong>Dónde es accesible</strong></td><td>En todo el programa</td><td>Solo dentro de esa función</td></tr>
        <tr><td><strong>Prioridad</strong></td><td>—</td><td>Si tiene el mismo nombre que una global, la oculta dentro de la función</td></tr>
      </tbody>
    </table></div>

    <h2>Parámetros vs argumentos</h2>
    <div class="table-wrap"><table>
      <thead><tr><th></th><th>Parámetros</th><th>Argumentos</th></tr></thead>
      <tbody>
        <tr><td><strong>Dónde aparecen</strong></td><td>En la <em>definición</em> de la función</td><td>En la <em>llamada</em> a la función</td></tr>
        <tr><td><strong>Qué son</strong></td><td>Variables locales dentro de la función</td><td>Los valores concretos que se pasan</td></tr>
        <tr><td><strong>Ejemplo</strong></td><td><code>def sumar(a, b)</code> → <code>a</code> y <code>b</code></td><td><code>sumar(3, 7)</code> → <code>3</code> y <code>7</code></td></tr>
      </tbody>
    </table></div>

    <pre><span class="lt">python</span><code><span class="kw">def</span> <span class="fn">sumar_numeros</span>(<span class="var">a</span>, <span class="var">b</span>):       <span class="cm"># a y b son PARÁMETROS</span>
    <span class="var">resultado</span> = <span class="var">a</span> + <span class="var">b</span>            <span class="cm"># resultado es variable LOCAL</span>
    <span class="kw">return</span> <span class="var">resultado</span>

<span class="var">numero1</span> = <span class="num">5</span>                        <span class="cm"># variables GLOBALES</span>
<span class="var">numero2</span> = <span class="num">10</span>
<span class="var">suma</span> = <span class="fn">sumar_numeros</span>(<span class="var">numero1</span>, <span class="var">numero2</span>)  <span class="cm"># numero1 y numero2 son ARGUMENTOS</span>
<span class="fn">print</span>(<span class="str">f"La suma de {<span class="var">numero1</span>} y {<span class="var">numero2</span>} es: {<span class="var">suma</span>}"</span>)

<span class="cm"># También se puede llamar con valores directos</span>
<span class="fn">print</span>(<span class="fn">sumar_numeros</span>(<span class="num">3</span>, <span class="num">7</span>))  <span class="cm"># 10</span></code></pre>
  </div>

  <!-- FN3: Sin parámetros -->
  <div class="sub-sec" id="sub-fn3">
    <h2>Funciones sin parámetros</h2>
    <p>No reciben ningún dato externo — los paréntesis van vacíos. Si no tienen <code>return</code>, devuelven <code>None</code>:</p>

    <pre><span class="lt">python</span><code><span class="kw">def</span> <span class="fn">funcion_sin_parametros</span>():
    <span class="var">x</span> = <span class="num">10</span>                                          <span class="cm"># variable LOCAL</span>
    <span class="fn">print</span>(<span class="str">f"El valor de x dentro de la función es: {<span class="var">x</span>}"</span>)

<span class="var">mensaje</span> = <span class="fn">funcion_sin_parametros</span>()
<span class="fn">print</span>(<span class="str">f"Mensaje devuelto por la función: {<span class="var">mensaje</span>}"</span>)
<span class="cm"># El valor de x dentro de la función es: 10</span>
<span class="cm"># Mensaje devuelto por la función: None</span></code></pre>

    <div class="callout info">
      <span class="callout-icon">💡</span>
      <p>Si una función no tiene <code>return</code>, Python devuelve <strong>None</strong> automáticamente.</p>
    </div>
  </div>

  <!-- FN4: Con parámetros -->
  <div class="sub-sec" id="sub-fn4">
    <h2>Funciones con un parámetro</h2>
    <p>Aceptan un único dato de entrada que actúa como variable local dentro de la función:</p>
    <pre><span class="lt">python</span><code><span class="kw">def</span> <span class="fn">es_impar</span>(<span class="var">lista</span>):
    <span class="var">lista_impares</span> = []
    <span class="kw">for</span> <span class="var">elemento</span> <span class="kw">in</span> <span class="var">lista</span>:
        <span class="kw">if</span> <span class="var">elemento</span> % <span class="num">2</span> != <span class="num">0</span>:
            <span class="var">lista_impares</span>.<span class="fn">append</span>(<span class="var">elemento</span>)
    <span class="kw">return</span> <span class="var">lista_impares</span>

<span class="fn">print</span>(<span class="fn">es_impar</span>([<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>, <span class="num">4</span>, <span class="num">5</span>, <span class="num">6</span>, <span class="num">7</span>, <span class="num">8</span>, <span class="num">9</span>]))
<span class="cm"># [1, 3, 5, 7, 9]</span></code></pre>

    <h2>Funciones con más de un parámetro</h2>
    <p>Los parámetros se separan por comas y se pasan en el <strong>mismo orden</strong> en que fueron definidos:</p>
    <pre><span class="lt">python</span><code><span class="kw">def</span> <span class="fn">calcular_area_rectangulo</span>(<span class="var">base</span>, <span class="var">altura</span>):
    <span class="var">area</span> = <span class="var">base</span> * <span class="var">altura</span>
    <span class="kw">return</span> <span class="var">area</span>

<span class="var">resultado</span> = <span class="fn">calcular_area_rectangulo</span>(<span class="num">5</span>, <span class="num">3</span>)
<span class="fn">print</span>(<span class="str">f"Área: {<span class="var">resultado</span>}"</span>)  <span class="cm"># Área: 15</span></code></pre>

    <h2>Ventajas de las funciones con parámetros</h2>
    <ul>
      <li><strong>Reutilización:</strong> la misma función sirve con diferentes valores de entrada.</li>
      <li><strong>Flexibilidad:</strong> se adapta a distintas situaciones sin modificar su código.</li>
      <li><strong>Legibilidad:</strong> los parámetros dejan claro qué datos necesita la función.</li>
      <li><strong>Modularidad:</strong> cada función realiza una tarea concreta y bien definida.</li>
    </ul>
  </div>

  <!-- FN5: Parámetro por defecto -->
  <div class="sub-sec" id="sub-fn5">
    <h2>Parámetros por defecto</h2>
    <p>Permiten asignar un <strong>valor predeterminado</strong> a uno o más parámetros. Si no se proporciona ese argumento al llamar la función, se usa el valor por defecto:</p>

    <pre><span class="lt">python</span><code><span class="kw">def</span> <span class="fn">rebajas</span>(<span class="var">precio</span>, <span class="var">descuento</span>=<span class="num">20</span>):   <span class="cm"># descuento tiene valor por defecto</span>
    <span class="kw">return</span> <span class="var">precio</span> - (<span class="var">precio</span> * <span class="var">descuento</span> / <span class="num">100</span>)

<span class="fn">print</span>(<span class="fn">rebajas</span>(<span class="num">100</span>))       <span class="cm"># usa descuento=20 → 80.0</span>
<span class="fn">print</span>(<span class="fn">rebajas</span>(<span class="num">100</span>, <span class="num">30</span>))   <span class="cm"># sobreescribe el defecto → 70.0</span>
<span class="fn">print</span>(<span class="fn">rebajas</span>(<span class="num">50</span>))        <span class="cm"># usa descuento=20 → 40.0</span></code></pre>

    <div class="callout warn">
      <span class="callout-icon">⚠️</span>
      <p>Los parámetros con valor por defecto siempre deben ir al <strong>final</strong> de la lista de parámetros, después de los que no tienen valor por defecto.</p>
    </div>
  </div>

  <!-- FN6: *args y **kwargs -->
  <div class="sub-sec" id="sub-fn6">
    <h2>*args — número variable de argumentos posicionales</h2>
    <p>Cuando no sabemos cuántos argumentos recibirá la función, usamos <code>*args</code>. Los agrupa como una <strong>tupla</strong>:</p>

    <pre><span class="lt">python</span><code><span class="cm"># ❌ Sin *args: error si pasamos más argumentos de los definidos</span>
<span class="kw">def</span> <span class="fn">nombres_clase</span>(<span class="var">nombre1</span>, <span class="var">nombre2</span>, <span class="var">nombre3</span>):
    <span class="fn">print</span>(<span class="var">nombre1</span>, <span class="var">nombre2</span>, <span class="var">nombre3</span>)

<span class="cm"># nombres_clase("Lidia","Victor","Alberto","David") → TypeError</span>

<span class="cm"># ✅ Con *args: acepta cualquier número de argumentos</span>
<span class="kw">def</span> <span class="fn">nombres_clase</span>(*<span class="var">args</span>):
    <span class="fn">print</span>(<span class="str">f"Nombres: {<span class="var">args</span>}"</span>)

<span class="fn">nombres_clase</span>(<span class="str">"Lidia"</span>, <span class="str">"Victor"</span>, <span class="str">"Alberto"</span>, <span class="str">"David"</span>)
<span class="cm"># Nombres: ('Lidia', 'Victor', 'Alberto', 'David')</span></code></pre>

    <h2>**kwargs — número variable de argumentos clave-valor</h2>
    <p>Cuando queremos pasar argumentos con nombre pero sin cantidad fija, usamos <code>**kwargs</code>. Los agrupa como un <strong>diccionario</strong>:</p>

    <pre><span class="lt">python</span><code><span class="cm"># ❌ Sin **kwargs: error si pasamos clave no definida</span>
<span class="cm"># imprimir_info(nombre='Juan', edad=30, apellido='Garcia') → TypeError</span>

<span class="cm"># ✅ Con **kwargs: acepta cualquier número de pares clave-valor</span>
<span class="kw">def</span> <span class="fn">imprimir_info</span>(**<span class="var">kwargs</span>):
    <span class="kw">for</span> <span class="var">key</span>, <span class="var">value</span> <span class="kw">in</span> <span class="var">kwargs</span>.<span class="fn">items</span>():
        <span class="fn">print</span>(<span class="str">f"{<span class="var">key</span>}: {<span class="var">value</span>}"</span>)

<span class="fn">imprimir_info</span>(<span class="var">nombre</span>=<span class="str">"Juan"</span>, <span class="var">edad</span>=<span class="num">30</span>, <span class="var">ciudad</span>=<span class="str">"Madrid"</span>, <span class="var">apellido</span>=<span class="str">"Garcia"</span>)
<span class="cm"># nombre: Juan  / edad: 30  / ciudad: Madrid  / apellido: Garcia</span></code></pre>

    <h2>*args vs **kwargs — ¿cuándo usar cada uno?</h2>
    <div class="table-wrap"><table>
      <thead><tr><th></th><th>*args</th><th>**kwargs</th></tr></thead>
      <tbody>
        <tr><td><strong>Tipo de argumento</strong></td><td>Posicionales (sin nombre)</td><td>Clave-valor (con nombre)</td></tr>
        <tr><td><strong>Se agrupa como</strong></td><td>Tupla</td><td>Diccionario</td></tr>
        <tr><td><strong>El orden importa</strong></td><td>✅ Sí</td><td>❌ No</td></tr>
        <tr><td><strong>Cuándo usarlo</strong></td><td>Cuando los argumentos son una secuencia</td><td>Cuando necesitas nombres descriptivos</td></tr>
      </tbody>
    </table></div>
  </div>

  <!-- FN7: Recursividad -->
  <div class="sub-sec" id="sub-fn7">
    <h2>Funciones recursivas</h2>
    <p>Una función recursiva es aquella que <strong>se llama a sí misma</strong> durante su ejecución. Para funcionar correctamente necesita dos componentes obligatorios:</p>
    <ul>
      <li><strong>Caso base:</strong> la condición que indica cuándo debe parar de llamarse a sí misma.</li>
      <li><strong>Caso recursivo:</strong> la llamada a sí misma con un problema más pequeño, acercándose al caso base.</li>
    </ul>

    <pre><span class="lt">python</span><code><span class="kw">def</span> <span class="fn">cuenta_atras</span>(<span class="var">inicio</span>):
    <span class="fn">print</span>(<span class="var">inicio</span>)
    <span class="var">siguiente</span> = <span class="var">inicio</span> - <span class="num">1</span>

    <span class="kw">if</span> <span class="var">siguiente</span> > <span class="num">0</span>:          <span class="cm"># caso recursivo</span>
        <span class="fn">cuenta_atras</span>(<span class="var">siguiente</span>)  <span class="cm"># se llama a sí misma</span>
    <span class="cm"># si siguiente <= 0, para (caso base implícito)</span>

<span class="fn">cuenta_atras</span>(<span class="num">5</span>)
<span class="cm"># 5 → 4 → 3 → 2 → 1</span></code></pre>

    <div class="callout warn">
      <span class="callout-icon">⚠️</span>
      <p>Toda función recursiva <strong>debe tener un caso base</strong> que detenga la recursión. Sin él, la función se llamaría infinitamente hasta provocar un error de desbordamiento de pila (<code>RecursionError</code>).</p>
    </div>
  </div>

  <!-- FN8: Lambdas -->
  <div class="sub-sec" id="sub-fn8">
    <h2>Funciones lambda</h2>
    <p>Son funciones <strong>pequeñas, anónimas y de una sola línea</strong>, definidas con la palabra clave <code>lambda</code> en lugar de <code>def</code>. Útiles para usarse una sola vez o en combinación con <code>map()</code>, <code>filter()</code> y <code>sorted()</code>.</p>

    <pre><span class="lt">python</span><code><span class="cm"># Sintaxis: lambda parámetros: expresión</span>

<span class="cm"># Con def:</span>
<span class="kw">def</span> <span class="fn">dividir_tres</span>(<span class="var">numero</span>):
    <span class="kw">return</span> <span class="var">numero</span> / <span class="num">3</span>

<span class="cm"># Con lambda — equivalente:</span>
<span class="var">division</span> = <span class="kw">lambda</span> <span class="var">x</span>: <span class="var">x</span> / <span class="num">3</span>
<span class="fn">print</span>(<span class="fn">division</span>(<span class="num">12</span>))   <span class="cm"># 4.0</span>

<span class="cm"># Con dos parámetros</span>
<span class="var">suma</span> = <span class="kw">lambda</span> <span class="var">x</span>, <span class="var">y</span>: <span class="var">x</span> + <span class="var">y</span>
<span class="fn">print</span>(<span class="fn">suma</span>(<span class="num">12</span>, <span class="num">3</span>))    <span class="cm"># 15</span>

<span class="cm"># Con list comprehension integrada</span>
<span class="var">div3</span> = <span class="kw">lambda</span> <span class="var">lista</span>: [<span class="var">x</span> <span class="kw">for</span> <span class="var">x</span> <span class="kw">in</span> <span class="var">lista</span> <span class="kw">if</span> <span class="var">x</span> % <span class="num">3</span> == <span class="num">0</span>]
<span class="fn">print</span>(<span class="fn">div3</span>([<span class="num">34</span>, <span class="num">39</span>, <span class="num">12</span>, <span class="num">15</span>, <span class="num">16</span>]))  <span class="cm"># [39, 12, 15]</span></code></pre>

    <div class="callout info">
      <span class="callout-icon">💡</span>
      <p>Una ventaja de las lambdas es la <strong>optimización de memoria</strong>: no se guardan en memoria una vez utilizadas. Para funciones complejas o reutilizables, usa siempre <code>def</code>.</p>
    </div>
  </div>

  <!-- FN9: map, filter, reduce -->
  <div class="sub-sec" id="sub-fn9">
    <h2>map(), filter() y reduce()</h2>
    <p>Funciones de orden superior que aplican una función a cada elemento de un iterable sin necesidad de bucles. Se usan habitualmente con lambdas.</p>

    <div class="callout info">
      <span class="callout-icon">📦</span>
      <p><code>map()</code> y <code>filter()</code> están integradas en Python. <code>reduce()</code> hay que importarla: <code>from functools import reduce</code></p>
    </div>

    <h2>map() — aplicar una función a cada elemento</h2>
    <p>Devuelve un objeto iterable con los resultados. Hay que convertirlo a lista para verlo:</p>
    <pre><span class="lt">python</span><code><span class="var">numeros</span> = [<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>, <span class="num">4</span>, <span class="num">5</span>]

<span class="cm"># Con función definida</span>
<span class="kw">def</span> <span class="fn">sqr</span>(<span class="var">num</span>): <span class="kw">return</span> <span class="var">num</span>**<span class="num">2</span>
<span class="fn">print</span>(<span class="fn">list</span>(<span class="fn">map</span>(<span class="fn">sqr</span>, <span class="var">numeros</span>)))          <span class="cm"># [1, 4, 9, 16, 25]</span>

<span class="cm"># Con lambda (más conciso)</span>
<span class="fn">print</span>(<span class="fn">list</span>(<span class="fn">map</span>(<span class="kw">lambda</span> <span class="var">x</span>: <span class="var">x</span>**<span class="num">2</span>, <span class="var">numeros</span>))) <span class="cm"># [1, 4, 9, 16, 25]</span></code></pre>

    <h2>filter() — seleccionar elementos que cumplen una condición</h2>
    <p>La función debe devolver <code>True</code> o <code>False</code>. Solo pasan los elementos para los que devuelve <code>True</code>:</p>
    <pre><span class="lt">python</span><code><span class="cm"># Filtrar números primos de una lista</span>
<span class="kw">def</span> <span class="fn">primos</span>(<span class="var">num</span>):
    <span class="kw">for</span> <span class="var">i</span> <span class="kw">in</span> <span class="fn">range</span>(<span class="num">2</span>, <span class="var">num</span>):
        <span class="kw">if</span> (<span class="var">num</span> % <span class="var">i</span>) == <span class="num">0</span>: <span class="kw">return</span> <span class="builtin">False</span>
    <span class="kw">return</span> <span class="builtin">True</span>

<span class="var">numeros</span> = [<span class="num">4</span>, <span class="num">8</span>, <span class="num">15</span>, <span class="num">16</span>, <span class="num">23</span>, <span class="num">42</span>]
<span class="fn">print</span>(<span class="fn">list</span>(<span class="fn">filter</span>(<span class="fn">primos</span>, <span class="var">numeros</span>)))   <span class="cm"># [23]</span>

<span class="cm"># Con diccionario: estudiantes mayores de edad</span>
<span class="var">estudiantes</span> = {<span class="str">'Ana'</span>: <span class="num">17</span>, <span class="str">'Juan'</span>: <span class="num">21</span>, <span class="str">'Luis'</span>: <span class="num">19</span>, <span class="str">'María'</span>: <span class="num">15</span>}
<span class="var">mayores</span> = <span class="fn">dict</span>(<span class="fn">filter</span>(<span class="kw">lambda</span> <span class="var">e</span>: <span class="var">e</span>[<span class="num">1</span>] > <span class="num">18</span>, <span class="var">estudiantes</span>.<span class="fn">items</span>()))
<span class="fn">print</span>(<span class="fn">list</span>(<span class="var">mayores</span>.<span class="fn">keys</span>()))             <span class="cm"># ['Juan', 'Luis']</span></code></pre>

    <h2>reduce() — reducir a un único valor</h2>
    <p>Aplica la función a los dos primeros elementos, guarda el resultado y lo aplica con el siguiente, hasta obtener <strong>un único valor</strong>:</p>
    <pre><span class="lt">python</span><code><span class="kw">from</span> <span class="var">functools</span> <span class="kw">import</span> <span class="fn">reduce</span>

<span class="var">numeros</span> = [<span class="num">23</span>, <span class="num">1</span>, <span class="num">45</span>, <span class="num">78</span>, <span class="num">5</span>, <span class="num">12</span>, <span class="num">98</span>, <span class="num">34</span>]

<span class="cm"># Número más alto</span>
<span class="fn">print</span>(<span class="fn">reduce</span>(<span class="kw">lambda</span> <span class="var">x</span>, <span class="var">y</span>: <span class="var">x</span> <span class="kw">if</span> <span class="var">x</span> > <span class="var">y</span> <span class="kw">else</span> <span class="var">y</span>, <span class="var">numeros</span>))  <span class="cm"># 98</span></code></pre>

    <h2>Comparativa: map vs filter vs reduce</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Función</th><th>¿Qué hace?</th><th>Devuelve</th><th>Importar</th></tr></thead>
      <tbody>
        <tr><td><code>map(f, it)</code></td><td>Aplica <code>f</code> a cada elemento</td><td>Iterador con todos los resultados</td><td>❌ No</td></tr>
        <tr><td><code>filter(f, it)</code></td><td>Filtra elementos donde <code>f</code> devuelve <code>True</code></td><td>Iterador con los elementos que pasan</td><td>❌ No</td></tr>
        <tr><td><code>reduce(f, it)</code></td><td>Acumula hasta un único valor</td><td>Un único valor</td><td>✅ <code>functools</code></td></tr>
      </tbody>
    </table></div>
    <div class="callout tip">
      <span class="callout-icon">✅</span>
      <p>Recuerda convertir el resultado de <code>map()</code> y <code>filter()</code> a lista con <code>list()</code> para poder verlo, ya que devuelven un objeto iterador.</p>
    </div>
  </div>
</template>

<script>
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebarOnMobile(){
  if(window.innerWidth <= 768){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  }
}
function toggleMod(id, btn) {
  const list = document.getElementById(id);
  list.classList.toggle('open');
  btn.classList.toggle('open');
}

function show(key, el, mod, cur) {
  const tpl = document.getElementById('tpl-' + key);
  if (!tpl) return;
  const c = document.getElementById('content');
  c.innerHTML = '';
  c.appendChild(tpl.content.cloneNode(true));
  document.getElementById('bc-mod').textContent = mod || '';
  document.getElementById('bc-cur').textContent = cur || '';
  document.getElementById('tb-tag').textContent = mod || '';
  document.querySelectorAll('.lesson-btn:not(.locked)').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  window.scrollTo(0, 0);
  closeSidebarOnMobile();
  // bind subtabs
  bindSubtabs();
}

function bindSubtabs() {
  document.querySelectorAll('.stab').forEach(btn => {
    btn.addEventListener('click', () => {
      const sub = btn.dataset.sub;
      document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.sub-sec').forEach(s => s.classList.remove('on'));
      btn.classList.add('active');
      const el = document.getElementById('sub-' + sub);
      if (el) el.classList.add('on');
    });
  });
}

function filterNav(q) {
  const term = q.toLowerCase().trim();
  document.querySelectorAll('.lesson-btn').forEach(btn => {
    const match = !term || btn.textContent.toLowerCase().includes(term);
    btn.style.display = match ? '' : 'none';
  });
  if (term) {
    document.querySelectorAll('.mod-wrap').forEach(wrap => {
      const list = wrap.querySelector('.lesson-list');
      const btn  = wrap.querySelector('.mod-btn');
      const visible = [...list.querySelectorAll('.lesson-btn')].some(b => b.style.display !== 'none');
      if (visible) { list.classList.add('open'); btn.classList.add('open'); }
    });
  }
}

</script>
<!-- ══════════════════════════════════════
