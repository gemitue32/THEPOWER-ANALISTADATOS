     subtabs: Conceptos básicos · Clases y objetos · Herencia · Polimorfismo
══════════════════════════════════════ -->
<template id="tpl-py_poo">
  <div class="topic-header">
    <div class="th-eyebrow">Módulo 4 · Python · Lección 3</div>
    <div class="th-title">Programación Orientada a <em>Objetos</em></div>
    <p class="th-desc">OOP: modela el mundo real con clases, objetos, atributos, métodos, herencia y polimorfismo.</p>
  </div>

  <div class="subtab-nav">
    <button class="stab active" data-sub="oo1">Conceptos básicos</button>
    <button class="stab" data-sub="oo2">Clases y objetos</button>
    <button class="stab" data-sub="oo3">Herencia</button>
    <button class="stab" data-sub="oo4">Polimorfismo</button>
  </div>

  <!-- OO1: Conceptos básicos -->
  <div class="sub-sec on" id="sub-oo1">
    <h2>¿Qué es la POO?</h2>
    <p>La <strong>Programación Orientada a Objetos</strong> (Object Oriented Programming, OOP) permite estructurar los programas agrupando propiedades y comportamientos en <strong>objetos individuales</strong>, que son réplicas de entidades del mundo real.</p>
    <p>Por ejemplo, un mueble tiene propiedades (color, forma, número de puertas) y comportamientos (abrir puertas). La POO modela estos conceptos como objetos de software.</p>

    <h2>Conceptos clave</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Concepto</th><th>Qué es</th><th>Ejemplo con Empleado</th></tr></thead>
      <tbody>
        <tr><td><strong>Clase</strong></td><td>Esquema o plantilla que define características comunes</td><td><code>class Empleado</code></td></tr>
        <tr><td><strong>Atributos</strong></td><td>Las características de cada objeto</td><td><code>nombre</code>, <code>posicion</code>, <code>salario</code></td></tr>
        <tr><td><strong>Métodos</strong></td><td>Las acciones que puede realizar un objeto</td><td><code>subir_sueldo()</code></td></tr>
        <tr><td><strong>Objeto / Instancia</strong></td><td>Entidad individual creada a partir de la clase</td><td><code>Juan = Empleado(...)</code></td></tr>
      </tbody>
    </table></div>

    <div class="callout info">
      <span class="callout-icon">📌</span>
      <p>Por convención, los nombres de las clases empiezan siempre con <strong>letra mayúscula</strong>: <code>Empleado</code>, <code>Producto</code>, <code>Animal</code>.</p>
    </div>

    <h2>¿Por qué son importantes las clases?</h2>
    <ul>
      <li><strong>Organización eficiente:</strong> agrupa datos y funciones relacionadas para manejar mejor la complejidad.</li>
      <li><strong>Reutilización:</strong> define una clase una vez y crea múltiples instancias con pocas líneas.</li>
      <li><strong>Modelado del mundo real:</strong> representa objetos e interacciones de forma intuitiva.</li>
      <li><strong>Extensibilidad:</strong> las clases se pueden heredar para extender funcionalidades sin tocar el código original.</li>
    </ul>
  </div>

  <!-- OO2: Clases y objetos -->
  <div class="sub-sec" id="sub-oo2">
    <h2>Crear una clase</h2>
    <p>Usamos la palabra reservada <code>class</code>. Una clase vacía se define con <code>pass</code>:</p>
    <pre><span class="lt">python</span><code><span class="kw">class</span> <span class="fn">Empleado</span>:
    <span class="kw">pass</span></code></pre>

    <h2>El método constructor __init__</h2>
    <p>Define los <strong>atributos</strong> del objeto. Se ejecuta automáticamente al instanciar. <code>self</code> hace referencia al objeto que se está creando:</p>
    <pre><span class="lt">python</span><code><span class="kw">class</span> <span class="fn">Empleado</span>:
    <span class="kw">def</span> <span class="fn">__init__</span>(<span class="var">self</span>, <span class="var">nombre</span>: str, <span class="var">apellido</span>: str, <span class="var">salario</span>: float):
        <span class="var">self</span>.<span class="var">nombre</span>   = <span class="var">nombre</span>
        <span class="var">self</span>.<span class="var">apellido</span> = <span class="var">apellido</span>
        <span class="var">self</span>.<span class="var">salario</span>  = <span class="var">salario</span></code></pre>

    <h2>Instanciar objetos y acceder a atributos</h2>
    <pre><span class="lt">python</span><code><span class="cm"># Instanciar (crear objetos a partir de la clase)</span>
<span class="var">Juan</span>  = <span class="fn">Empleado</span>(<span class="str">"Juan"</span>,  <span class="str">"Perez"</span>, <span class="num">50000</span>)
<span class="var">Maria</span> = <span class="fn">Empleado</span>(<span class="str">"Maria"</span>, <span class="str">"Gomez"</span>, <span class="num">60000</span>)

<span class="cm"># Acceder a un atributo: objeto.atributo</span>
<span class="fn">print</span>(<span class="var">Juan</span>.<span class="var">salario</span>)    <span class="cm"># 50000</span>

<span class="cm"># Acceder a todos los atributos: objeto.__dict__</span>
<span class="fn">print</span>(<span class="var">Maria</span>.<span class="fn">__dict__</span>)
<span class="cm"># {'nombre': 'Maria', 'apellido': 'Gomez', 'salario': 60000}</span></code></pre>

    <h2>Métodos de una clase</h2>
    <p>Los métodos son las <strong>funciones</strong> de la clase. Siempre reciben <code>self</code> como primer parámetro:</p>
    <pre><span class="lt">python</span><code><span class="kw">class</span> <span class="fn">Empleado</span>:
    <span class="kw">def</span> <span class="fn">__init__</span>(<span class="var">self</span>, <span class="var">nombre</span>: str, <span class="var">apellido</span>: str, <span class="var">salario</span>: float):
        <span class="var">self</span>.<span class="var">nombre</span>   = <span class="var">nombre</span>
        <span class="var">self</span>.<span class="var">apellido</span> = <span class="var">apellido</span>
        <span class="var">self</span>.<span class="var">salario</span>  = <span class="var">salario</span>

    <span class="kw">def</span> <span class="fn">subir_sueldo</span>(<span class="var">self</span>, <span class="var">porcentaje</span>: float):
        <span class="var">self</span>.<span class="var">salario</span> += <span class="var">self</span>.<span class="var">salario</span> * (<span class="var">porcentaje</span> / <span class="num">100</span>)
        <span class="var">self</span>.<span class="var">salario</span>  = <span class="fn">round</span>(<span class="var">self</span>.<span class="var">salario</span>, <span class="num">2</span>)

<span class="cm"># Usar el método</span>
<span class="var">juan</span> = <span class="fn">Empleado</span>(<span class="str">"Juan"</span>, <span class="str">"Perez"</span>, <span class="num">50000</span>)
<span class="var">juan</span>.<span class="fn">subir_sueldo</span>(<span class="num">10</span>)
<span class="fn">print</span>(<span class="var">juan</span>.<span class="var">salario</span>)  <span class="cm"># 55000.0</span></code></pre>

    <div class="callout tip">
      <span class="callout-icon">✅</span>
      <p><code>self</code> siempre es el primer parámetro de cualquier método y hace referencia al propio objeto sobre el que se llama el método.</p>
    </div>
  </div>

  <!-- OO3: Herencia -->
  <div class="sub-sec" id="sub-oo3">
    <h2>¿Qué es la herencia?</h2>
    <p>Permite crear <strong>nuevas clases que heredan atributos y métodos</strong> de clases ya definidas, evitando duplicar código.</p>

    <div class="table-wrap"><table>
      <thead><tr><th>Término</th><th>También llamada</th><th>Qué es</th></tr></thead>
      <tbody>
        <tr><td>Clase madre</td><td>Superclase / Parent</td><td>La clase original de la que se hereda</td></tr>
        <tr><td>Clase hija</td><td>Subclase / Child</td><td>La nueva clase que hereda. Puede añadir o modificar atributos y métodos</td></tr>
      </tbody>
    </table></div>

    <h2>Ejemplo: Producto → Electrodoméstico</h2>
    <pre><span class="lt">python</span><code><span class="cm"># Clase madre</span>
<span class="kw">class</span> <span class="fn">Producto</span>:
    <span class="kw">def</span> <span class="fn">__init__</span>(<span class="var">self</span>, <span class="var">nombre</span>: str, <span class="var">precio</span>: float, <span class="var">plataforma_venta</span>: str, <span class="var">IVA</span>: float):
        <span class="var">self</span>.<span class="var">nombre</span>            = <span class="var">nombre</span>
        <span class="var">self</span>.<span class="var">precio</span>            = <span class="var">precio</span>
        <span class="var">self</span>.<span class="var">plataforma_venta</span>   = <span class="var">plataforma_venta</span>
        <span class="var">self</span>.<span class="var">IVA</span>               = <span class="var">IVA</span>

<span class="cm"># Clase hija: hereda de Producto y añade certificado_energetico</span>
<span class="kw">class</span> <span class="fn">Electrodomestico</span>(<span class="fn">Producto</span>):
    <span class="kw">def</span> <span class="fn">__init__</span>(<span class="var">self</span>, <span class="var">nombre</span>, <span class="var">precio</span>, <span class="var">plataforma_venta</span>, <span class="var">IVA</span>, <span class="var">certificado_energetico</span>: str):
        <span class="fn">super</span>().<span class="fn">__init__</span>(<span class="var">nombre</span>, <span class="var">precio</span>, <span class="var">plataforma_venta</span>, <span class="var">IVA</span>)  <span class="cm"># hereda de Producto</span>
        <span class="var">self</span>.<span class="var">certificado_energetico</span> = <span class="var">certificado_energetico</span>

    <span class="kw">def</span> <span class="fn">evaluar_certificacion</span>(<span class="var">self</span>):
        <span class="kw">if</span> <span class="var">self</span>.<span class="var">certificado_energetico</span> <span class="kw">in</span> [<span class="str">'A'</span>, <span class="str">'B'</span>, <span class="str">'C'</span>]:
            <span class="kw">return</span> <span class="str">f"{<span class="var">self</span>.<span class="var">nombre</span>}: certificación {<span class="var">self</span>.<span class="var">certificado_energetico</span>} — buen rendimiento."</span>
        <span class="kw">else</span>:
            <span class="kw">return</span> <span class="str">f"{<span class="var">self</span>.<span class="var">nombre</span>}: certificación {<span class="var">self</span>.<span class="var">certificado_energetico</span>} — rendimiento deficiente."</span>

<span class="var">lavadora</span> = <span class="fn">Electrodomestico</span>(<span class="str">"Siemens"</span>, <span class="num">500.0</span>, <span class="str">"Tienda Online"</span>, <span class="num">21.0</span>, <span class="str">"A"</span>)
<span class="fn">print</span>(<span class="var">lavadora</span>.<span class="fn">evaluar_certificacion</span>())
<span class="cm"># Siemens: certificación A — buen rendimiento.</span></code></pre>

    <div class="callout info">
      <span class="callout-icon">💡</span>
      <p><code>super().__init__(...)</code> llama al constructor de la clase madre para que la clase hija herede sus atributos sin tener que redefinirlos.</p>
    </div>
  </div>

  <!-- OO4: Polimorfismo -->
  <div class="sub-sec" id="sub-oo4">
    <h2>¿Qué es el polimorfismo?</h2>
    <p>El <strong>polimorfismo</strong> permite que distintos objetos de una jerarquía de clases respondan a un <strong>mismo método de formas diferentes</strong>. El método tiene el mismo nombre en todas las clases pero se comporta de manera distinta en cada una.</p>

    <h2>Ejemplo: Animal → Perro, Gato, Vaca</h2>
    <pre><span class="lt">python</span><code><span class="kw">class</span> <span class="fn">Animal</span>:
    <span class="kw">def</span> <span class="fn">__init__</span>(<span class="var">self</span>, <span class="var">nombre</span>):
        <span class="var">self</span>.<span class="var">nombre</span> = <span class="var">nombre</span>
    <span class="kw">def</span> <span class="fn">hablar</span>(<span class="var">self</span>):
        <span class="kw">return</span> <span class="str">"El animal hace un sonido"</span>

<span class="kw">class</span> <span class="fn">Perro</span>(<span class="fn">Animal</span>):
    <span class="kw">def</span> <span class="fn">hablar</span>(<span class="var">self</span>):         <span class="cm"># sobreescribe el método de la clase madre</span>
        <span class="kw">return</span> <span class="str">"¡Guau!"</span>

<span class="kw">class</span> <span class="fn">Gato</span>(<span class="fn">Animal</span>):
    <span class="kw">def</span> <span class="fn">hablar</span>(<span class="var">self</span>):
        <span class="kw">return</span> <span class="str">"¡Miau!"</span>

<span class="kw">class</span> <span class="fn">Vaca</span>(<span class="fn">Animal</span>):
    <span class="kw">def</span> <span class="fn">hablar</span>(<span class="var">self</span>):
        <span class="kw">return</span> <span class="str">"¡Muu!"</span>

<span class="kw">def</span> <span class="fn">hacer_hablar</span>(<span class="var">animal</span>):
    <span class="fn">print</span>(<span class="str">f"{<span class="var">animal</span>.<span class="var">nombre</span>} dice: {<span class="var">animal</span>.<span class="fn">hablar</span>()}"</span>)

<span class="var">animales</span> = [<span class="fn">Perro</span>(<span class="str">"Rex"</span>), <span class="fn">Gato</span>(<span class="str">"Mittens"</span>), <span class="fn">Vaca</span>(<span class="str">"Bessie"</span>)]
<span class="kw">for</span> <span class="var">animal</span> <span class="kw">in</span> <span class="var">animales</span>:
    <span class="fn">hacer_hablar</span>(<span class="var">animal</span>)
<span class="cm"># Rex dice: ¡Guau!</span>
<span class="cm"># Mittens dice: ¡Miau!</span>
<span class="cm"># Bessie dice: ¡Muu!</span></code></pre>

    <div class="callout tip">
      <span class="callout-icon">✅</span>
      <p>El polimorfismo permite escribir código genérico que funciona con cualquier objeto de la jerarquía. La función <code>hacer_hablar()</code> no necesita saber si recibe un perro, un gato o una vaca: solo llama a <code>hablar()</code> y cada objeto responde a su manera.</p>
    </div>

    <h2>Herencia vs Polimorfismo</h2>
    <div class="table-wrap"><table>
      <thead><tr><th></th><th>Herencia</th><th>Polimorfismo</th></tr></thead>
      <tbody>
        <tr><td><strong>Qué hace</strong></td><td>Una clase hija <em>hereda</em> atributos y métodos de la madre</td><td>Clases distintas tienen un método con el <em>mismo nombre</em> pero diferente comportamiento</td></tr>
        <tr><td><strong>Palabra clave</strong></td><td><code>class Hija(Madre)</code></td><td>Redefinir el método en la clase hija</td></tr>
        <tr><td><strong>Ejemplo</strong></td><td><code>Electrodomestico(Producto)</code></td><td><code>hablar()</code> en Perro, Gato, Vaca</td></tr>
        <tr><td><strong>Para qué sirve</strong></td><td>Reutilizar y extender código</td><td>Escribir código genérico y flexible</td></tr>
      </tbody>
    </table></div>
  </div>
</template>

     PYTHON — LECCIÓN 4: LIBRERÍAS Y MÓDULOS
     subtabs: Introducción · datetime · os · Manejo de ficheros
══════════════════════════════════════ -->
<template id="tpl-py_lib">
  <div class="topic-header">
    <div class="th-eyebrow">Módulo 4 · Python · Lección 4</div>
    <div class="th-title">Librerías y <em>Módulos</em></div>
    <p class="th-desc">Reutiliza código ya escrito: librerías integradas (math, datetime, os) y externas (numpy, pandas). Aprende a importarlas y a trabajar con ficheros.</p>
  </div>

  <div class="subtab-nav">
    <button class="stab active" data-sub="lb1">Introducción</button>
    <button class="stab" data-sub="lb2">datetime</button>
    <button class="stab" data-sub="lb3">os</button>
    <button class="stab" data-sub="lb4">Manejo de ficheros</button>
  </div>

  <!-- LB1: Introducción -->
  <div class="sub-sec on" id="sub-lb1">
    <h2>¿Qué es una librería?</h2>
    <p>Una <strong>librería o módulo</strong> es un conjunto de variables, funciones y clases almacenadas en archivos que podemos importar y usar en nuestros programas sin necesidad de desarrollarlas nosotros.</p>

    <h2>Tipos de librerías</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Tipo</th><th>Descripción</th><th>Ejemplos</th><th>Instalar</th></tr></thead>
      <tbody>
        <tr><td><strong>Integradas</strong></td><td>Vienen preinstaladas con Python</td><td><code>math</code>, <code>os</code>, <code>datetime</code></td><td>❌ No</td></tr>
        <tr><td><strong>Externas</strong></td><td>Hay que instalarlas manualmente con pip</td><td><code>numpy</code>, <code>pandas</code></td><td>✅ Sí</td></tr>
      </tbody>
    </table></div>

    <pre><span class="lt">bash</span><code><span class="cm"># Instalar librerías externas</span>
pip install numpy
pip install pandas</code></pre>

    <div class="callout info">
      <span class="callout-icon">📌</span>
      <p><code>numpy</code> y <code>pandas</code> son librerías fundamentales en el mundo del dato y se verán en profundidad más adelante en el programa.</p>
    </div>

    <h2>Dos formas de importar</h2>
    <h3>1. Importar la librería completa</h3>
    <p>Accedes a sus métodos con <code>libreria.metodo()</code>:</p>
    <pre><span class="lt">python</span><code><span class="kw">import</span> <span class="var">math</span>

<span class="var">numero</span> = <span class="num">36</span>
<span class="var">raiz</span> = <span class="var">math</span>.<span class="fn">sqrt</span>(<span class="var">numero</span>)
<span class="fn">print</span>(<span class="str">f"La raíz cuadrada de {<span class="var">numero</span>} es: {<span class="var">raiz</span>}"</span>)  <span class="cm"># 6.0</span></code></pre>

    <h3>2. Importar solo lo que necesitas</h3>
    <p>Usas el método directamente, sin nombrar la librería:</p>
    <pre><span class="lt">python</span><code><span class="kw">from</span> <span class="var">math</span> <span class="kw">import</span> <span class="fn">sqrt</span>

<span class="var">numero</span> = <span class="num">49</span>
<span class="fn">print</span>(<span class="fn">sqrt</span>(<span class="var">numero</span>))  <span class="cm"># 7.0</span></code></pre>

    <h2>Ventajas de las librerías</h2>
    <ul>
      <li><strong>Reutilización:</strong> usa funciones y clases ya escritas sin volver a desarrollarlas.</li>
      <li><strong>Facilidad:</strong> encapsulan funcionalidades complejas en funciones simples.</li>
      <li><strong>Rendimiento:</strong> están optimizadas, mejoran la eficiencia frente a implementaciones propias.</li>
      <li><strong>Mantenimiento:</strong> las librerías populares reciben actualizaciones y correcciones regulares.</li>
      <li><strong>Escalabilidad:</strong> permiten añadir nuevas funcionalidades o integrar tecnologías fácilmente.</li>
      <li><strong>Documentación:</strong> las librerías populares están bien documentadas y tienen soporte activo.</li>
    </ul>

    <div class="callout tip">
      <span class="callout-icon">✅</span>
      <p>Los <code>import</code> deben estar siempre al <strong>principio del archivo</strong> y solo es necesario hacerlos <strong>una vez</strong> por archivo.</p>
    </div>
  </div>

  <!-- LB2: datetime -->
  <div class="sub-sec" id="sub-lb2">
    <h2>Módulo datetime</h2>
    <p>Permite manipular <strong>fechas y horas</strong> de forma flexible: extraer campos, formatear, calcular diferencias y trabajar con zonas horarias.</p>

    <pre><span class="lt">python</span><code><span class="kw">import</span> <span class="var">datetime</span></code></pre>

    <h2>datetime.datetime — fecha y hora combinadas</h2>
    <pre><span class="lt">python</span><code><span class="cm"># Fecha y hora específica (año, mes, día, hora, min, seg)</span>
<span class="var">fecha_esp</span> = <span class="var">datetime</span>.<span class="fn">datetime</span>(<span class="num">2024</span>, <span class="num">6</span>, <span class="num">1</span>, <span class="num">12</span>, <span class="num">0</span>, <span class="num">0</span>)
<span class="fn">print</span>(<span class="var">fecha_esp</span>)    <span class="cm"># 2024-06-01 12:00:00</span>

<span class="cm"># Fecha y hora actuales del ordenador</span>
<span class="var">ahora</span> = <span class="var">datetime</span>.<span class="var">datetime</span>.<span class="fn">now</span>()
<span class="fn">print</span>(<span class="var">ahora</span>)</code></pre>

    <h2>datetime.date — solo fecha</h2>
    <pre><span class="lt">python</span><code><span class="var">hoy</span>      = <span class="var">datetime</span>.<span class="var">date</span>.<span class="fn">today</span>()
<span class="var">fecha_fija</span> = <span class="var">datetime</span>.<span class="fn">date</span>(<span class="num">2024</span>, <span class="num">6</span>, <span class="num">1</span>)
<span class="fn">print</span>(<span class="var">hoy</span>)        <span class="cm"># 2024-05-19</span>
<span class="fn">print</span>(<span class="var">fecha_fija</span>)  <span class="cm"># 2024-06-01</span></code></pre>

    <h2>datetime.time — solo hora</h2>
    <pre><span class="lt">python</span><code><span class="var">hora_elegida</span> = <span class="var">datetime</span>.<span class="fn">time</span>(<span class="num">14</span>, <span class="num">30</span>, <span class="num">0</span>)
<span class="fn">print</span>(<span class="var">hora_elegida</span>)  <span class="cm"># 14:30:00</span></code></pre>

    <h2>strftime — formatear fechas</h2>
    <p>Cambia el formato de presentación de una fecha u hora:</p>
    <pre><span class="lt">python</span><code><span class="var">ahora</span> = <span class="var">datetime</span>.<span class="var">datetime</span>.<span class="fn">now</span>()

<span class="cm"># Formato completo</span>
<span class="fn">print</span>(<span class="var">ahora</span>.<span class="fn">strftime</span>(<span class="str">"%Y-%m-%d %H:%M:%S"</span>))  <span class="cm"># 2024-05-19 10:30:00</span>

<span class="cm"># Solo fecha en formato europeo</span>
<span class="fn">print</span>(<span class="var">ahora</span>.<span class="fn">date</span>().<span class="fn">strftime</span>(<span class="str">"%d/%m/%Y"</span>))      <span class="cm"># 19/05/2024</span>

<span class="cm"># Solo hora</span>
<span class="fn">print</span>(<span class="var">ahora</span>.<span class="fn">time</span>().<span class="fn">strftime</span>(<span class="str">"%H:%M:%S"</span>))       <span class="cm"># 10:30:00</span></code></pre>

    <h2>timedelta — calcular diferencias de fechas</h2>
    <pre><span class="lt">python</span><code><span class="var">hoy</span> = <span class="var">datetime</span>.<span class="var">date</span>.<span class="fn">today</span>()

<span class="var">hace_una_semana</span>      = <span class="var">hoy</span> - <span class="var">datetime</span>.<span class="fn">timedelta</span>(<span class="var">days</span>=<span class="num">7</span>)
<span class="var">dentro_tres_meses</span>    = <span class="var">hoy</span> + <span class="var">datetime</span>.<span class="fn">timedelta</span>(<span class="var">days</span>=<span class="num">90</span>)

<span class="fn">print</span>(<span class="var">hace_una_semana</span>)    <span class="cm"># 7 días antes de hoy</span>
<span class="fn">print</span>(<span class="var">dentro_tres_meses</span>)  <span class="cm"># 90 días después de hoy</span></code></pre>

    <div class="table-wrap"><table>
      <thead><tr><th>Método</th><th>Para qué sirve</th></tr></thead>
      <tbody>
        <tr><td><code>datetime.datetime(y,m,d,H,M,S)</code></td><td>Crear fecha y hora específica</td></tr>
        <tr><td><code>datetime.datetime.now()</code></td><td>Fecha y hora actuales del sistema</td></tr>
        <tr><td><code>datetime.date.today()</code></td><td>Fecha de hoy (sin hora)</td></tr>
        <tr><td><code>datetime.time(H,M,S)</code></td><td>Crear una hora concreta</td></tr>
        <tr><td><code>.strftime("formato")</code></td><td>Formatear la fecha/hora como string</td></tr>
        <tr><td><code>datetime.timedelta(days=N)</code></td><td>Sumar o restar días a una fecha</td></tr>
      </tbody>
    </table></div>
  </div>

  <!-- LB3: os -->
  <div class="sub-sec" id="sub-lb3">
    <h2>Módulo os</h2>
    <p>Proporciona funciones para <strong>interactuar con el sistema operativo</strong>: manipular archivos y directorios, obtener rutas, listar contenido, crear y eliminar carpetas.</p>

    <pre><span class="lt">python</span><code><span class="kw">import</span> <span class="var">os</span></code></pre>

    <h2>Abrir y cerrar archivos (bajo nivel)</h2>
    <pre><span class="lt">python</span><code><span class="cm"># Abrir en modo lectura/escritura</span>
<span class="var">archivo</span> = <span class="var">os</span>.<span class="fn">open</span>(<span class="str">"archivo.txt"</span>, <span class="var">os</span>.<span class="var">O_RDWR</span>)
<span class="fn">print</span>(<span class="str">f"Descriptor: {<span class="var">archivo</span>}"</span>)
<span class="var">os</span>.<span class="fn">close</span>(<span class="var">archivo</span>)
<span class="fn">print</span>(<span class="str">"Archivo cerrado."</span>)</code></pre>

    <h2>Leer contenido (os.read + decode)</h2>
    <pre><span class="lt">python</span><code><span class="var">f</span> = <span class="var">os</span>.<span class="fn">open</span>(<span class="str">"archivo.txt"</span>, <span class="var">os</span>.<span class="var">O_RDONLY</span>)
<span class="var">contenido</span> = <span class="var">os</span>.<span class="fn">read</span>(<span class="var">f</span>, <span class="num">100</span>)           <span class="cm"># lee 100 bytes</span>
<span class="fn">print</span>(<span class="var">contenido</span>.<span class="fn">decode</span>(<span class="str">'utf-8'</span>))        <span class="cm"># convierte bytes a texto</span>
<span class="var">os</span>.<span class="fn">close</span>(<span class="var">f</span>)</code></pre>

    <h2>Navegar por directorios</h2>
    <pre><span class="lt">python</span><code><span class="cm"># Ver directorio actual</span>
<span class="fn">print</span>(<span class="var">os</span>.<span class="fn">getcwd</span>())

<span class="cm"># Cambiar de directorio</span>
<span class="var">os</span>.<span class="fn">chdir</span>(<span class="str">'/ruta/al/nuevo/directorio'</span>)
<span class="fn">print</span>(<span class="var">os</span>.<span class="fn">getcwd</span>())  <span class="cm"># verifica el cambio</span>

<span class="cm"># Listar contenido de un directorio</span>
<span class="fn">print</span>(<span class="var">os</span>.<span class="fn">listdir</span>(<span class="str">'/ruta/al/directorio'</span>))</code></pre>

    <h2>Crear y eliminar</h2>
    <pre><span class="lt">python</span><code><span class="cm"># Crear directorio</span>
<span class="var">os</span>.<span class="fn">mkdir</span>(<span class="str">'/ruta/nuevo/directorio'</span>)

<span class="cm"># Eliminar archivo</span>
<span class="var">os</span>.<span class="fn">remove</span>(<span class="str">'archivo_a_eliminar.txt'</span>)

<span class="cm"># Eliminar directorio (debe estar vacío)</span>
<span class="var">os</span>.<span class="fn">rmdir</span>(<span class="str">'/ruta/directorio_a_eliminar'</span>)</code></pre>

    <h2>Comprobar existencia y construir rutas</h2>
    <pre><span class="lt">python</span><code><span class="cm"># Verificar si existe un archivo o directorio</span>
<span class="kw">if</span> <span class="var">os</span>.<span class="var">path</span>.<span class="fn">exists</span>(<span class="str">'/ruta/archivo'</span>):
    <span class="fn">print</span>(<span class="str">"existe"</span>)
<span class="kw">else</span>:
    <span class="fn">print</span>(<span class="str">"no existe"</span>)

<span class="cm"># Construir una ruta uniendo partes</span>
<span class="var">ruta</span> = <span class="var">os</span>.<span class="var">path</span>.<span class="fn">join</span>(<span class="str">'/ruta/base'</span>, <span class="str">'archivo.txt'</span>)
<span class="fn">print</span>(<span class="var">ruta</span>)  <span class="cm"># /ruta/base/archivo.txt</span></code></pre>

    <div class="table-wrap"><table>
      <thead><tr><th>Método</th><th>Para qué sirve</th></tr></thead>
      <tbody>
        <tr><td><code>os.open(ruta, modo)</code></td><td>Abrir archivo a bajo nivel</td></tr>
        <tr><td><code>os.close(descriptor)</code></td><td>Cerrar el archivo</td></tr>
        <tr><td><code>os.read(descriptor, n)</code></td><td>Leer n bytes del archivo</td></tr>
        <tr><td><code>os.getcwd()</code></td><td>Ver directorio de trabajo actual</td></tr>
        <tr><td><code>os.chdir(ruta)</code></td><td>Cambiar de directorio</td></tr>
        <tr><td><code>os.listdir(ruta)</code></td><td>Listar archivos y carpetas</td></tr>
        <tr><td><code>os.mkdir(ruta)</code></td><td>Crear un directorio</td></tr>
        <tr><td><code>os.remove(archivo)</code></td><td>Eliminar un archivo</td></tr>
        <tr><td><code>os.rmdir(ruta)</code></td><td>Eliminar un directorio vacío</td></tr>
        <tr><td><code>os.path.exists(ruta)</code></td><td>Comprobar si existe</td></tr>
        <tr><td><code>os.path.join(base, nombre)</code></td><td>Construir una ruta completa</td></tr>
      </tbody>
    </table></div>
  </div>

  <!-- LB4: Manejo de ficheros -->
  <div class="sub-sec" id="sub-lb4">
    <h2>Manejo de ficheros con open()</h2>
    <p>Python tiene una función nativa <code>open()</code> para trabajar con archivos de forma más sencilla que con el módulo <code>os</code>. Devuelve un <strong>objeto fichero</strong> con el que podemos leer, escribir y manipular el archivo.</p>

    <div class="table-wrap"><table>
      <thead><tr><th>Modo</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>"r"</code></td><td>Lectura (por defecto). Error si el archivo no existe.</td></tr>
        <tr><td><code>"w"</code></td><td>Escritura. Crea el archivo si no existe. <strong>Sobreescribe</strong> si ya existe.</td></tr>
        <tr><td><code>"a"</code></td><td>Añadir. Escribe al final sin borrar el contenido anterior.</td></tr>
      </tbody>
    </table></div>

    <h2>Abrir un fichero</h2>
    <pre><span class="lt">python</span><code><span class="cm"># Abrir en modo lectura</span>
<span class="var">fichero</span> = <span class="fn">open</span>(<span class="str">'mi_fichero.txt'</span>, <span class="str">'r'</span>)</code></pre>

    <h2>Leer un fichero</h2>
    <pre><span class="lt">python</span><code><span class="var">fichero</span> = <span class="fn">open</span>(<span class="str">'mi_fichero.txt'</span>, <span class="str">'r'</span>)

<span class="cm"># Leer todo el contenido de una vez</span>
<span class="var">contenido</span> = <span class="var">fichero</span>.<span class="fn">read</span>()

<span class="cm"># Leer solo una línea</span>
<span class="var">linea</span> = <span class="var">fichero</span>.<span class="fn">readline</span>()</code></pre>

    <h2>Escribir en un fichero</h2>
    <pre><span class="lt">python</span><code><span class="cm"># Modo "w": sobreescribe el contenido</span>
<span class="var">fichero</span> = <span class="fn">open</span>(<span class="str">'mi_fichero.txt'</span>, <span class="str">'w'</span>)
<span class="var">fichero</span>.<span class="fn">write</span>(<span class="str">"Hola, mundo!"</span>)

<span class="cm"># Modo "a": añade al final sin borrar</span>
<span class="var">fichero</span> = <span class="fn">open</span>(<span class="str">'mi_fichero.txt'</span>, <span class="str">'a'</span>)
<span class="var">fichero</span>.<span class="fn">write</span>(<span class="str">"\nNueva línea añadida"</span>)</code></pre>

    <h2>Cerrar un fichero</h2>
    <p>Es <strong>importante cerrar siempre los ficheros</strong> después de usarlos para liberar recursos del sistema:</p>
    <pre><span class="lt">python</span><code><span class="var">fichero</span> = <span class="fn">open</span>(<span class="str">'mi_fichero.txt'</span>, <span class="str">'w'</span>)
<span class="var">fichero</span>.<span class="fn">write</span>(<span class="str">"Contenido"</span>)
<span class="var">fichero</span>.<span class="fn">close</span>()  <span class="cm"># libera el recurso</span></code></pre>

    <div class="callout tip">
      <span class="callout-icon">✅</span>
      <p>La diferencia principal entre <code>open()</code> nativo y <code>os.open()</code>: el nativo trabaja a <strong>alto nivel</strong> (más sencillo, devuelve un objeto fichero con métodos como <code>.read()</code>), mientras que <code>os.open()</code> trabaja a <strong>bajo nivel</strong> (devuelve un descriptor numérico, requiere <code>os.read()</code> y <code>decode()</code>).</p>
    </div>
  </div>
</template>

<template id="tpl-est_inf">
  <div class="topic-header">
    <div class="th-eyebrow">Módulo 5 · Estadística avanzada · Lección 1</div>
    <div class="th-title">Estadística <em>Inferencial</em></div>
    <p class="th-desc">Aprende a sacar conclusiones sobre toda una población a partir de una muestra pequeña. Más sencillo de lo que parece.</p>
  </div>

  <div class="subtab-nav">
    <button class="stab active" data-sub="ei1">Introducción</button>
    <button class="stab" data-sub="ei2">Intervalo de confianza</button>
    <button class="stab" data-sub="ei3">Hipótesis estadísticas</button>
  </div>

  <!-- EI1: Introducción -->
  <div class="sub-sec on" id="sub-ei1">

    <div class="callout tip">
      <span class="callout-icon">🎯</span>
      <p><strong>La idea clave en una frase:</strong> en lugar de preguntar a 47 millones de españoles qué van a votar, encuestas a 1.000 personas y, si las has elegido bien, puedes predecir el resultado con bastante precisión. Eso es la estadística inferencial.</p>
    </div>

    <h2>Estadística descriptiva vs inferencial</h2>
    <div class="table-wrap"><table>
      <thead><tr><th></th><th>Estadística descriptiva</th><th>Estadística inferencial</th></tr></thead>
      <tbody>
        <tr><td><strong>¿Qué hace?</strong></td><td>Resume y describe los datos que ya tienes</td><td>Hace predicciones sobre datos que NO tienes</td></tr>
        <tr><td><strong>Pregunta que responde</strong></td><td>"¿Cómo son estos datos?"</td><td>"¿Qué puedo concluir del total?"</td></tr>
        <tr><td><strong>Ejemplo</strong></td><td>La nota media de esta clase es 7,2</td><td>La nota media de todos los alumnos de España es 7,2 ± 0,3</td></tr>
      </tbody>
    </table></div>

    <h2>Los 6 conceptos clave — explicados sin tecnicismos</h2>

    <h3>1. Población y muestra</h3>
    <p><strong>Población</strong> es el grupo completo que te interesa estudiar. <strong>Muestra</strong> es el grupo pequeño que realmente puedes medir.</p>
    <div class="callout info">
      <span class="callout-icon">🌍</span>
      <p><strong>Ejemplo visual:</strong> quieres saber la altura media de todos los adultos españoles (47M de personas = <em>población</em>). Mides a 500 personas elegidas al azar (= <em>muestra</em>) y usas esos datos para estimar la altura de todos.</p>
    </div>

    <h3>2. Parámetros y estimadores</h3>
    <p>Un <strong>parámetro</strong> es el valor real de la población (casi siempre desconocido). Un <strong>estimador</strong> es el valor que calculas con tu muestra para aproximarte a ese valor real.</p>
    <div class="callout info">
      <span class="callout-icon">📏</span>
      <p><strong>Ejemplo:</strong> la altura media real de todos los españoles es el <em>parámetro</em> (lo desconoces). La media de tus 500 medidos es el <em>estimador</em> (lo calculas tú).</p>
    </div>

    <h3>3. Distribuciones muestrales y el Teorema Central del Límite</h3>
    <p>Si repites el experimento muchas veces (tomas muchas muestras distintas de 500 personas), las medias de cada muestra formarán una <strong>distribución normal</strong> (la famosa campana de Gauss), aunque la población original no sea normal.</p>
    <div class="callout tip">
      <span class="callout-icon">🔔</span>
      <p>Este resultado se llama <strong>Teorema Central del Límite</strong> y es el fundamento matemático que hace posible todo lo demás en estadística inferencial. Cuanto mayor es la muestra, más se acerca la distribución a la campana perfecta.</p>
    </div>

    <h3>4. Intervalos de confianza</h3>
    <p>En lugar de decir "la media poblacional ES 170 cm" (lo cual sería demasiado exacto), dices "la media está <strong>entre 168 y 172 cm con un 95% de confianza</strong>". Ese rango es el intervalo de confianza.</p>

    <h3>5. Contraste de hipótesis</h3>
    <p>Es el proceso de poner a prueba una afirmación: "¿tengo suficiente evidencia en mis datos para creer que esto es cierto o falso?"</p>
    <div class="callout info">
      <span class="callout-icon">⚖️</span>
      <p><strong>Ejemplo:</strong> una empresa dice que sus productos pesan 500g. Mides 40 y obtienes una media de 510g. ¿Es suficiente diferencia para decir que la empresa miente, o podría ser solo azar de la muestra?</p>
    </div>

    <h3>6. Errores en inferencia</h3>
    <div class="table-wrap"><table>
      <thead><tr><th>Error</th><th>Qué significa</th><th>Analogía</th></tr></thead>
      <tbody>
        <tr><td><strong>Error tipo I (α)</strong></td><td>Rechazar H₀ cuando es verdadera — detectas un efecto que no existe</td><td>Condemnar a un inocente</td></tr>
        <tr><td><strong>Error tipo II (β)</strong></td><td>No rechazar H₀ cuando es falsa — no detectas un efecto que sí existe</td><td>Absolver a un culpable</td></tr>
      </tbody>
    </table></div>
  </div>

  <!-- EI2: Intervalo de confianza -->
  <div class="sub-sec" id="sub-ei2">
    <div class="callout tip">
      <span class="callout-icon">🎯</span>
      <p><strong>La idea clave:</strong> nunca puedes saber el valor exacto de una población a partir de una muestra. Pero sí puedes decir con qué probabilidad el valor real está dentro de un rango. Eso es el intervalo de confianza.</p>
    </div>

    <h2>¿Qué es el intervalo de confianza?</h2>
    <p>Es un <strong>rango de valores</strong> dentro del cual esperamos que esté el valor real de la población, acompañado de un porcentaje de seguridad (el nivel de confianza).</p>
    <div class="callout info">
      <span class="callout-icon">🌡️</span>
      <p><strong>Ejemplo del día a día:</strong> el pronóstico del tiempo dice "mañana hará entre 18°C y 22°C". No te dicen un valor exacto porque hay incertidumbre, pero te dan un rango razonable. Eso es exactamente un intervalo de confianza.</p>
    </div>

    <h2>Los 3 ingredientes que necesitas</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Ingrediente</th><th>Qué es</th><th>Ejemplo</th></tr></thead>
      <tbody>
        <tr><td><strong>Estimador puntual</strong></td><td>El valor que calculas de la muestra (la mejor estimación)</td><td>Media de la muestra = 50.000€</td></tr>
        <tr><td><strong>Margen de error</strong></td><td>Cuánto te puedes equivocar hacia arriba o hacia abajo</td><td>± 392€</td></tr>
        <tr><td><strong>Nivel de confianza</strong></td><td>La probabilidad de que el valor real esté dentro del rango</td><td>95% (el más común)</td></tr>
      </tbody>
    </table></div>

    <h2>El nivel de confianza — ¿qué significa exactamente el 95%?</h2>
    <p>Si repitieras el experimento 100 veces (tomando 100 muestras distintas y calculando 100 intervalos), <strong>95 de esos intervalos contendrían el valor real</strong> de la población. Los otros 5 fallarían.</p>
    <div class="callout warn">
      <span class="callout-icon">⚠️</span>
      <p>El 95% <strong>no significa</strong> que haya un 95% de probabilidad de que el valor real esté en ese intervalo concreto. Significa que el <em>método</em> que usas acierta el 95% de las veces si lo repites muchas veces.</p>
    </div>

    <h2>Ejemplo 1 — Salarios de empleados</h2>
    <p>Una empresa quiere saber el salario medio de sus empleados. No puede preguntar a todos.</p>
    <ul>
      <li>Muestra de <strong>100 empleados</strong></li>
      <li>Media muestral: <strong>50.000€</strong></li>
      <li>Desviación estándar poblacional: <strong>2.000€</strong></li>
      <li>Nivel de confianza: <strong>95%</strong> (valor Z = 1,96)</li>
    </ul>
    <p>Resultado: el salario medio poblacional está entre <strong>49.608€ y 50.392€</strong> con un 95% de confianza.</p>
    <div class="callout tip">
      <span class="callout-icon">💬</span>
      <p>Cómo leerlo en voz alta: <em>"Estamos un 95% seguros de que el salario medio real de toda la empresa está entre 49.608€ y 50.392€."</em></p>
    </div>

    <h2>Ejemplo 2 — Notas de un examen</h2>
    <ul>
      <li>Muestra de <strong>36 estudiantes</strong></li>
      <li>Media muestral: <strong>75 puntos</strong></li>
      <li>Desviación estándar poblacional: <strong>10 puntos</strong></li>
      <li>Nivel de confianza: <strong>90%</strong></li>
    </ul>
    <p>Resultado: la nota media real de todos los alumnos está entre <strong>72,26 y 77,74 puntos</strong> con un 90% de confianza.</p>

    <h2>Cuanto más ancho el intervalo, más incertidumbre</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Para reducir el intervalo (más precisión)…</th><th>¿Qué pasa?</th></tr></thead>
      <tbody>
        <tr><td>Aumenta el <strong>tamaño de la muestra</strong></td><td>✅ Intervalo más estrecho</td></tr>
        <tr><td>Baja el <strong>nivel de confianza</strong> (de 99% a 90%)</td><td>✅ Intervalo más estrecho, pero menos seguro</td></tr>
        <tr><td>Aumenta el <strong>nivel de confianza</strong> (de 95% a 99%)</td><td>⚠️ Intervalo más ancho, más seguro</td></tr>
      </tbody>
    </table></div>
  </div>

  <!-- EI3: Hipótesis estadísticas -->
  <div class="sub-sec" id="sub-ei3">
    <div class="callout tip">
      <span class="callout-icon">🎯</span>
      <p><strong>La idea clave:</strong> es como un juicio. Tienes una acusación (hipótesis alternativa) y una presunción de inocencia (hipótesis nula). Con los datos, decides si hay suficiente evidencia para condenar o no.</p>
    </div>

    <h2>Las dos hipótesis</h2>
    <div class="table-wrap"><table>
      <thead><tr><th></th><th>Hipótesis nula (H₀)</th><th>Hipótesis alternativa (H₁)</th></tr></thead>
      <tbody>
        <tr><td><strong>Qué dice</strong></td><td>"No pasa nada especial" / "No hay efecto"</td><td>"Sí hay efecto o diferencia"</td></tr>
        <tr><td><strong>Posición</strong></td><td>Se asume verdadera hasta que se pruebe lo contrario</td><td>Lo que queremos demostrar</td></tr>
        <tr><td><strong>Ejemplo</strong></td><td>El peso medio es 500g</td><td>El peso medio NO es 500g</td></tr>
        <tr><td><strong>Analogía</strong></td><td>Presunción de inocencia</td><td>La acusación</td></tr>
      </tbody>
    </table></div>

    <h2>Los 5 pasos del contraste de hipótesis</h2>

    <h3>Paso 1 — Formula las hipótesis</h3>
    <p>Define claramente qué es H₀ y qué es H₁ antes de ver ningún dato.</p>
    <pre><span class="lt">ejemplo</span><code>H₀: μ = 500  (el peso medio ES 500g)
H₁: μ ≠ 500  (el peso medio NO ES 500g → contraste bilateral)</code></pre>

    <h3>Paso 2 — Elige el nivel de significancia (α)</h3>
    <p>Es el riesgo que estás dispuesto a asumir de equivocarte (Error Tipo I). El más habitual es <strong>α = 0,05 (5%)</strong>.</p>
    <div class="callout info">
      <span class="callout-icon">💡</span>
      <p>α = 0,05 significa: "acepto un 5% de probabilidad de rechazar H₀ aunque sea verdadera (condenar a un inocente)."</p>
    </div>

    <h3>Paso 3 — Calcula el estadístico de prueba (Z)</h3>
    <p>Un número que mide cuánto se aleja tu muestra de lo que H₀ predice. Cuanto más extremo, menos probable bajo H₀.</p>

    <h3>Paso 4 — Calcula el p-valor</h3>
    <p>El <strong>p-valor</strong> es la probabilidad de obtener un resultado tan extremo como el tuyo (o más) si H₀ fuera verdadera.</p>
    <div class="table-wrap"><table>
      <thead><tr><th>p-valor</th><th>Interpretación</th><th>Decisión</th></tr></thead>
      <tbody>
        <tr><td>p &lt; α (ej. 0,001 &lt; 0,05)</td><td>Resultado muy improbable si H₀ fuera cierta</td><td>✅ Rechazar H₀</td></tr>
        <tr><td>p &gt; α (ej. 0,3 &gt; 0,05)</td><td>Resultado compatible con H₀</td><td>❌ No rechazar H₀</td></tr>
      </tbody>
    </table></div>
    <div class="callout warn">
      <span class="callout-icon">⚠️</span>
      <p>El p-valor <strong>no es</strong> la probabilidad de que H₀ sea verdadera. Es la probabilidad de ver datos tan extremos como los tuyos <em>suponiendo que</em> H₀ fuera verdadera.</p>
    </div>

    <h3>Paso 5 — Conclusión</h3>
    <p>Si rechazas H₀ → hay evidencia estadística suficiente para apoyar H₁.<br>Si no rechazas H₀ → no hay suficiente evidencia. <em>No significa que H₀ sea verdadera</em>, solo que no puedes descartarla.</p>

    <h2>Ejemplo completo — ¿La fábrica miente con el peso?</h2>
    <p>Una fábrica dice que sus productos pesan <strong>500g</strong> de media. Tú mides <strong>40 productos</strong> y obtienes una media de <strong>510g</strong>. La desviación estándar poblacional es <strong>20g</strong>. ¿Hay evidencia de que la fábrica miente? (α = 0,05)</p>

    <div class="table-wrap"><table>
      <thead><tr><th>Paso</th><th>Resultado</th></tr></thead>
      <tbody>
        <tr><td><strong>H₀ / H₁</strong></td><td>H₀: μ = 500g &nbsp;|&nbsp; H₁: μ ≠ 500g (bilateral)</td></tr>
        <tr><td><strong>Nivel de significancia</strong></td><td>α = 0,05</td></tr>
        <tr><td><strong>Estadístico Z</strong></td><td>Z = (510 - 500) / (20 / √40) = 10 / 3,16 = <strong>3,16</strong></td></tr>
        <tr><td><strong>p-valor</strong></td><td>0,0008 × 2 = <strong>0,0016</strong> (bilateral)</td></tr>
        <tr><td><strong>Comparación</strong></td><td>p-valor (0,0016) &lt; α (0,05) → <strong>rechazamos H₀</strong></td></tr>
        <tr><td><strong>Conclusión</strong></td><td>Con un 95% de confianza, el peso medio real es significativamente diferente de 500g. La fábrica probablemente no cumple su promesa.</td></tr>
      </tbody>
    </table></div>

    <h2>Tipos de errores — resumen visual</h2>
    <div class="table-wrap"><table>
      <thead><tr><th></th><th>H₀ es VERDADERA</th><th>H₀ es FALSA</th></tr></thead>
      <tbody>
        <tr><td><strong>Rechazas H₀</strong></td><td>❌ Error tipo I (α) — condenar a un inocente</td><td>✅ Decisión correcta</td></tr>
        <tr><td><strong>No rechazas H₀</strong></td><td>✅ Decisión correcta</td><td>❌ Error tipo II (β) — absolver a un culpable</td></tr>
