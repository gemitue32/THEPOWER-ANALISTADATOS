<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data & Analytics — Guía Personal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─────────────────────────────── */
:root {
  --ink:     #0f1117;
  --ink2:    #3a3f52;
  --ink3:    #8891a8;
  --paper:   #fafbfd;
  --white:   #ffffff;
  --border:  #e8eaf2;
  --border2: #d2d6e8;
  --green:   #00b37e;
  --green-d: #007a55;
  --green-t: #e6f7f1;
  --green-b: #b3e8d8;
  --blue:    #3b6bff;
  --blue-t:  #eef1ff;
  --amber:   #e07b00;
  --amber-t: #fff4e0;
  --code-bg: #f3f4f8;
  --sb-w:    268px;
  --radius:  12px;
}

/* ─── RESET ──────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--paper);
  color: var(--ink);
  display: flex;
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.75;
}

/* ─── SIDEBAR ────────────────────────────── */
#sidebar {
  width: var(--sb-w);
  background: var(--white);
  border-right: 1px solid var(--border);
  position: fixed;
  inset: 0 auto 0 0;
  display: flex;
  flex-direction: column;
  z-index: 200;
  overflow: hidden;
}

/* logo strip */
.sb-brand {
  padding: 22px 20px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sb-course {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 4px;
}
.sb-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.2;
}
.sb-title em { font-style: italic; color: var(--green); }

/* search */
.sb-search {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sb-search-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 11px;
}
.sb-search-wrap svg { flex-shrink: 0; color: var(--ink3); }
.sb-search-wrap input {
  flex: 1;
  border: none;
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--ink);
  outline: none;
}
.sb-search-wrap input::placeholder { color: var(--ink3); }

/* nav scroll area */
.sb-nav {
  flex: 1;
  overflow-y: auto;
  padding: 10px 10px 24px;
}
.sb-nav::-webkit-scrollbar { width: 3px; }
.sb-nav::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* module group */
.mod-wrap { margin-bottom: 2px; }

.mod-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 10px;
  border-radius: 9px;
  border: none;
  background: transparent;
  cursor: pointer;
  text-align: left;
  transition: background .13s;
}
.mod-btn:hover { background: var(--paper); }
.mod-btn.open  { background: var(--paper); }

.mod-pip {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 1px;
}
.mod-name {
  flex: 1;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink2);
  line-height: 1.3;
}
.mod-badge {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--ink3);
  background: var(--border);
  padding: 2px 6px;
  border-radius: 4px;
}
.mod-chevron {
  font-size: 9px;
  color: var(--ink3);
  transition: transform .2s;
  flex-shrink: 0;
}
.mod-btn.open .mod-chevron { transform: rotate(90deg); }

/* lesson list */
.lesson-list {
  max-height: 0;
  overflow: hidden;
  transition: max-height .28s ease;
}
.lesson-list.open { max-height: 800px; }

.lesson-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px 6px 22px;
  border-radius: 8px;
  border: none;
  background: transparent;
  cursor: pointer;
  text-align: left;
  transition: background .12s;
  margin-bottom: 1px;
}
.lesson-btn:hover:not(.locked) { background: var(--green-t); }
.lesson-btn.active {
  background: var(--green-t);
}
.lesson-btn.locked { opacity: .38; cursor: default; }

.l-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--border2);
  flex-shrink: 0;
}
.lesson-btn.active .l-dot { background: var(--green); }

.l-text {
  flex: 1;
  font-size: 12.5px;
  color: var(--ink2);
  line-height: 1.35;
}
.lesson-btn.active .l-text { color: var(--green-d); font-weight: 500; }
.l-lock { font-size: 11px; color: var(--ink3); margin-left: auto; }

/* module color palette */
.pip-1  { background: #00b37e; } .pip-2  { background: #3b6bff; }
.pip-3  { background: #8b5cf6; } .pip-4  { background: #0891b2; }
.pip-5  { background: #e07b00; } .pip-6  { background: #e11d48; }
.pip-7  { background: #0369a1; } .pip-8  { background: #7c3aed; }
.pip-9  { background: #be185d; } .pip-10 { background: #047857; }
.pip-14 { background: #7e22ce; } .pip-15 { background: #c2410c; }
.pip-16 { background: #0f766e; }

/* ─── MAIN ────────────────────────────────── */
#main {
  margin-left: var(--sb-w);
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* topbar */
#topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(250,251,253,.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12.5px;
  color: var(--ink3);
}
.breadcrumb .sep { color: var(--border2); }
.breadcrumb .bc-mod { color: var(--green-d); font-weight: 500; }
.breadcrumb .bc-cur { color: var(--ink); }
.tb-tag {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  background: var(--green-t);
  color: var(--green-d);
  border: 1px solid var(--green-b);
  padding: 3px 10px;
  border-radius: 20px;
}

/* content area */
#content {
  flex: 1;
  padding: 48px 56px 80px;
  max-width: 900px;
}
#content { animation: rise .25s ease both; }
@keyframes rise {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ─── TOPIC HEADER ───────────────────────── */
.topic-header {
  margin-bottom: 36px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--border);
}
.th-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 10px;
}
.th-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 34px;
  font-weight: 600;
  line-height: 1.15;
  color: var(--ink);
  margin-bottom: 10px;
}
.th-title em { font-style: italic; color: var(--green); font-weight: 300; }
.th-desc {
  font-size: 15px;
  color: var(--ink3);
  max-width: 580px;
  line-height: 1.65;
}

/* ─── SUBTAB NAV ─────────────────────────── */
.subtab-nav {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-bottom: 32px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 5px;
  width: fit-content;
}
.stab {
  font-family: 'DM Sans', sans-serif;
  font-size: 12.5px;
  font-weight: 400;
  padding: 7px 14px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--ink3);
  cursor: pointer;
  transition: all .14s;
  white-space: nowrap;
}
.stab:hover { background: var(--paper); color: var(--ink2); }
.stab.active {
  background: var(--green);
  color: #fff;
  font-weight: 500;
  box-shadow: 0 2px 8px rgba(0,179,126,.3);
}

/* ─── SUB-SECTIONS ───────────────────────── */
.sub-sec { display: none; animation: rise .18s ease both; }
.sub-sec.on { display: block; }

/* ─── TYPOGRAPHY ─────────────────────────── */
h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--ink);
  margin: 36px 0 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
h2::before {
  content: '';
  width: 3px; height: 20px;
  background: var(--green);
  border-radius: 2px;
  flex-shrink: 0;
}
h3 {
  font-size: 14.5px;
  font-weight: 600;
  color: var(--ink);
  margin: 24px 0 8px;
  display: flex;
  align-items: center;
  gap: 7px;
}
h3::before {
  content: '';
  width: 14px; height: 2px;
  background: var(--border2);
  border-radius: 1px;
}
p { color: var(--ink2); margin-bottom: 12px; }
p strong { color: var(--ink); }
ul, ol { padding-left: 18px; margin-bottom: 14px; }
li { color: var(--ink2); margin-bottom: 5px; }
li strong { color: var(--ink); }

/* ─── CODE ───────────────────────────────── */
pre {
  background: var(--ink);
  border-radius: 12px;
  padding: 22px 24px;
  margin: 14px 0 22px;
  overflow-x: auto;
  position: relative;
}
pre .lt {
  position: absolute;
  top: 10px; right: 16px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #4a5568;
  text-transform: uppercase;
  letter-spacing: .1em;
}
code {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  line-height: 1.9;
  color: #e2e8f0;
}
.kw { color: #f97583; }
.fn { color: #b392f0; }
.str { color: #9ecbff; }
.num { color: #79b8ff; }
.cm { color: #586069; font-style: italic; }
.var { color: #ffab70; }
.builtin { color: #85e89d; }

p > code, li > code {
  font-family: 'DM Mono', monospace;
  font-size: 12.5px;
  background: var(--code-bg);
  color: #8250df;
  padding: 2px 6px;
  border-radius: 5px;
  border: 1px solid var(--border);
}

/* ─── CALLOUTS ───────────────────────────── */
.callout {
  display: flex;
  gap: 12px;
  padding: 14px 16px;
  border-radius: 10px;
  margin: 18px 0;
  border-left: 3px solid;
  align-items: flex-start;
}
.callout.tip   { background: var(--green-t); border-color: var(--green); }
.callout.info  { background: var(--blue-t);  border-color: var(--blue); }
.callout.warn  { background: var(--amber-t); border-color: var(--amber); }
.callout-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.callout p { margin: 0; font-size: 13.5px; }
.callout.tip  p { color: var(--green-d); }
.callout.info p { color: #1e3a8a; }
.callout.warn p { color: #92400e; }

/* ─── TABLE ──────────────────────────────── */
.table-wrap { overflow-x: auto; margin: 14px 0 22px; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13.5px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}
thead tr { background: var(--ink); }
th {
  color: #e2e8f0;
  font-family: 'DM Mono', monospace;
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: .07em;
  text-transform: uppercase;
  padding: 10px 14px;
  text-align: left;
}
td {
  padding: 9px 14px;
  color: var(--ink2);
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
tr:last-child td { border-bottom: none; }
tbody tr:nth-child(even) td { background: var(--paper); }
tbody tr:hover td { background: var(--green-t); }
td code {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: #8250df;
  background: var(--code-bg);
  padding: 1px 5px;
  border-radius: 4px;
}

/* ─── HOME PAGE ──────────────────────────── */
.home-hero {
  margin-bottom: 44px;
}
.home-hero-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 12px;
}
.home-hero-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 42px;
  font-weight: 600;
  line-height: 1.1;
  color: var(--ink);
  margin-bottom: 14px;
}
.home-hero-title em { font-style: italic; color: var(--green); font-weight: 300; }
.home-hero-desc { font-size: 16px; color: var(--ink3); max-width: 520px; line-height: 1.65; }

.home-section-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink3);
  margin: 36px 0 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.home-section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.mod-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 12px; }

.mod-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  cursor: pointer;
  transition: all .18s;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  overflow: hidden;
}
.mod-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--card-color, var(--border));
  border-radius: 2px 2px 0 0;
}
.mod-card:hover { border-color: var(--card-color, var(--border2)); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.07); }
.mod-card.locked { opacity: .42; cursor: default; }
.mod-card.locked:hover { transform: none; box-shadow: none; border-color: var(--border); }

.mc-num {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--ink3);
}
.mc-title { font-size: 14px; font-weight: 500; color: var(--ink); line-height: 1.3; }
.mc-sub { font-size: 12px; color: var(--ink3); line-height: 1.45; }
.mc-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
}
.mc-badge {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  background: var(--green-t);
  color: var(--green-d);
  border: 1px solid var(--green-b);
  padding: 2px 8px;
  border-radius: 10px;
}
.mc-lock { font-size: 12px; color: var(--ink3); }

/* ─── COMING SOON ────────────────────────── */
.coming-box {
  border: 2px dashed var(--border2);
  border-radius: var(--radius);
  padding: 48px;
  text-align: center;
  color: var(--ink3);
}
.coming-box .cb-icon { font-size: 36px; margin-bottom: 14px; }
.coming-box h3 { font-size: 17px; font-weight: 500; color: var(--ink2); margin-bottom: 8px; }
.coming-box h3::before { display: none; }
.coming-box p { font-size: 14px; margin: 0; }

/* ─── SCROLLBAR ──────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── RESPONSIVE MÓVIL ── */
#menu-toggle {
  display: none;
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 1000;
  width: 42px;
  height: 42px;
  border-radius: 10px;
  border: none;
  background: var(--green);
  color: #fff;
  font-size: 22px;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 10px rgba(0,179,126,.4);
}
#sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 998;
}
@media (max-width: 768px) {
  #menu-toggle { display: flex !important; }
  #sidebar {
    left: calc(-1 * var(--sb-w) - 10px) !important;
    transition: left .25s ease;
    box-shadow: 4px 0 24px rgba(0,0,0,.18);
    z-index: 999;
  }
  #sidebar.open { left: 0 !important; }
  #sidebar-overlay.open { display: block !important; }
  #main {
    margin-left: 0 !important;
    padding-top: 58px;
  }
  .content-inner, .tb-inner { padding: 14px !important; }
  h1 { font-size: 19px !important; }
  h2 { font-size: 15px !important; }
  pre, code { font-size: 12px !important; overflow-x: auto !important; }
  table { font-size: 12px !important; }
}
</style>
</head>
<body>

<!-- BOTÓN MENÚ MÓVIL -->
<button id="menu-toggle" onclick="toggleSidebar()">☰</button>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- ═══════════ SIDEBAR ═══════════ -->
<aside id="sidebar">
  <div class="sb-brand">
    <div class="sb-course">Guía personal del curso</div>
    <div class="sb-title">Data &amp; <em>Analytics</em></div>
  </div>

  <div class="sb-search">
    <div class="sb-search-wrap">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" placeholder="Buscar…" oninput="filterNav(this.value)">
    </div>
  </div>

  <nav class="sb-nav" id="sbNav">

    <!-- 1. Intro al Análisis de Datos (era 2) -->
    <div class="mod-wrap">
      <button class="mod-btn" onclick="toggleMod('m2',this)">
        <span class="mod-pip pip-2"></span>
        <span class="mod-name">1. Intro. al Análisis de Datos</span>
        <span class="mod-badge">4L</span>
        <span class="mod-chevron">▶</span>
      </button>
      <div class="lesson-list" id="m2">
        <button class="lesson-btn locked"><span class="l-dot"></span><span class="l-text">Qué es Data Analytics</span><span class="l-lock">🔒</span></button>
        <button class="lesson-btn locked"><span class="l-dot"></span><span class="l-text">Principios de Data Analytics</span><span class="l-lock">🔒</span></button>
        <button class="lesson-btn locked"><span class="l-dot"></span><span class="l-text">Estadística descriptiva</span><span class="l-lock">🔒</span></button>
        <button class="lesson-btn locked"><span class="l-dot"></span><span class="l-text">Conceptos básicos probabilidad</span><span class="l-lock">🔒</span></button>
      </div>
    </div>

    <!-- 2. Dashboard & Análisis (era 4) -->
    <div class="mod-wrap">
      <button class="mod-btn" onclick="toggleMod('m4',this)">
        <span class="mod-pip pip-4"></span>
        <span class="mod-name">2. Dashboard &amp; Análisis</span>
        <span class="mod-badge">5L</span>
        <span class="mod-chevron">▶</span>
      </button>
      <div class="lesson-list" id="m4">
        <button class="lesson-btn locked"><span class="l-dot"></span><span class="l-text">EDA: Análisis exploratorio</span><span class="l-lock">🔒</span></button>
        <button class="lesson-btn locked"><span class="l-dot"></span><span class="l-text">EDA con Excel</span><span class="l-lock">🔒</span></button>
        <button class="lesson-btn locked"><span class="l-dot"></span><span class="l-text">EDA con Google Sheets</span><span class="l-lock">🔒</span></button>
        <button class="lesson-btn locked"><span class="l-dot"></span><span class="l-text">Dashboard guiado Excel</span><span class="l-lock">🔒</span></button>
        <button class="lesson-btn locked"><span class="l-dot"></span><span class="l-text">Dashboard guiado Google Sheets</span><span class="l-lock">🔒</span></button>
      </div>
    </div>

    <!-- 3. SQL (era 5) -->
    <div class="mod-wrap">
      <button class="mod-btn" onclick="toggleMod('m5',this)">
        <span class="mod-pip pip-5"></span>
        <span class="mod-name">3. SQL</span>
        <span class="mod-badge">8L</span>
        <span class="mod-chevron">▶</span>
      </button>
      <div class="lesson-list" id="m5">
        <button class="lesson-btn" id="lb-sql-fund" onclick="show('sql_fund',this,'3. SQL','Fundamentos de SQL')">
          <span class="l-dot"></span><span class="l-text">1. Fundamentos de SQL</span>
        </button>
        <button class="lesson-btn" id="lb-sql-basicas" onclick="show('sql_basicas',this,'3. SQL','Consultas Básicas')">

  </div>

  <!-- S1 Variables -->
  <div class="sub-sec on" id="sub-s1">
    <h2>Entorno: VSCode + Jupyter Notebook</h2>
    <p>Para trabajar con Python necesitas instalar dos extensiones en VSCode:</p>
    <ul>
      <li><strong>Python</strong> (Microsoft) — ejecuta código Python en el editor.</li>
      <li><strong>Jupyter Notebook</strong> (Microsoft) — archivos <code>.ipynb</code> interactivos con resultados inmediatos.</li>
    </ul>
    <div class="callout info"><span class="callout-icon">⌨️</span><p><code>Ctrl + Enter</code> ejecuta la celda actual · <code>Shift + Enter</code> ejecuta y avanza a la siguiente.</p></div>

    <h2>¿Qué es una variable?</h2>
    <p>Una <strong>caja donde almacenamos un valor</strong>. La sintaxis es siempre <code>nombre = valor</code>:</p>
    <pre><span class="lt">python</span><code><span class="cm"># Definimos una variable numérica</span>
<span class="var">variable_numerica</span> = <span class="num">3</span>
</code></pre>

    <h2>Sobreescribir una variable</h2>
    <p>Si usas el mismo nombre dos veces, el segundo valor <strong>reemplaza</strong> al primero:</p>
    <pre><span class="lt">python</span><code><span class="var">numero_1</span> = <span class="num">100</span>
<span class="var">numero_1</span> = <span class="num">200</span>  <span class="cm"># ahora numero_1 vale 200</span>
</code></pre>
    <div class="callout warn"><span class="callout-icon">⚠️</span><p>Cuidado con los nombres repetidos: el valor final es siempre el último asignado.</p></div>

    <h2>Palabras reservadas</h2>
    <p>Python tiene palabras que <strong>no puedes usar como nombre de variable</strong> porque pertenecen al lenguaje. Tu editor las resaltará en un color diferente:</p>
    <pre><span class="lt">reservadas</span><code><span class="kw">int</span>  <span class="kw">float</span>  <span class="kw">str</span>  <span class="kw">bool</span>  <span class="builtin">True</span>  <span class="builtin">False</span>  <span class="builtin">None</span>
<span class="kw">if</span>  <span class="kw">elif</span>  <span class="kw">else</span>  <span class="kw">for</span>  <span class="kw">while</span>  <span class="kw">def</span>  <span class="kw">return</span>  <span class="kw">class</span></code></pre>
  </div>

  <!-- S2 Tipos y funciones -->
  <div class="sub-sec" id="sub-s2">
    <h2>Tipos de datos</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Tipo</th><th>Palabra clave</th><th>Descripción</th><th>Ejemplo</th></tr></thead>
      <tbody>
        <tr><td>Entero</td><td><code>int</code></td><td>Sin parte decimal</td><td><code>-6, 0, 42</code></td></tr>
        <tr><td>Decimal</td><td><code>float</code></td><td>Con parte decimal</td><td><code>2.8, .2, 3.14</code></td></tr>
        <tr><td>Complejo</td><td><code>complex</code></td><td>Parte real + imaginaria</td><td><code>2+3j</code></td></tr>
        <tr><td>Texto</td><td><code>str</code></td><td>Cadena de caracteres</td><td><code>"Hola"</code></td></tr>
        <tr><td>Booleano</td><td><code>bool</code></td><td>Verdadero o falso</td><td><code>True / False</code></td></tr>
        <tr><td>Nulo</td><td><code>NoneType</code></td><td>Sin valor asignado</td><td><code>None</code></td></tr>
      </tbody>
    </table></div>
    <div class="callout warn"><span class="callout-icon">📌</span><p><code>None</code> no es lo mismo que <code>0</code>, ni que <code>False</code>, ni que <code>""</code>. Son valores completamente distintos.</p></div>

    <h2>Funciones incorporadas</h2>
    <h3>print()</h3>
    <pre><span class="lt">python</span><code><span class="var">nombre</span> = <span class="str">"Ana"</span>
<span class="fn">print</span>(<span class="str">f"Hola, me llamo {<span class="var">nombre</span>}"</span>)  <span class="cm"># f-string (recomendado)</span>
<span class="fn">print</span>(<span class="str">"Tengo"</span>, <span class="num">25</span>, <span class="str">"años"</span>)           <span class="cm"># separando con comas</span>
</code></pre>
    <h3>type()</h3>
    <pre><span class="lt">python</span><code><span class="fn">print</span>(<span class="fn">type</span>(<span class="str">"Hola"</span>))  <span class="cm"># &lt;class 'str'&gt;</span>
<span class="fn">print</span>(<span class="fn">type</span>(<span class="num">3</span>))       <span class="cm"># &lt;class 'int'&gt;</span>
</code></pre>
    <h3>len()</h3>
    <pre><span class="lt">python</span><code><span class="fn">print</span>(<span class="fn">len</span>(<span class="str">"Hola"</span>))  <span class="cm"># 4   ← no funciona con números</span>
</code></pre>
    <h3>input()</h3>
    <pre><span class="lt">python</span><code><span class="var">valor</span> = <span class="fn">input</span>(<span class="str">"Tu nombre: "</span>)  <span class="cm"># siempre devuelve str</span>
<span class="fn">print</span>(<span class="fn">type</span>(<span class="var">valor</span>))               <span class="cm"># &lt;class 'str'&gt;</span>
</code></pre>
    <div class="callout info"><span class="callout-icon">💡</span><p>Si necesitas que el usuario introduzca un número: <code>int(input("Edad: "))</code></p></div>
  </div>

  <!-- S3 Operadores -->
  <div class="sub-sec" id="sub-s3">
    <h2>Operadores aritméticos</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Op.</th><th>Nombre</th><th>Ejemplo</th><th>Resultado</th></tr></thead>
      <tbody>
        <tr><td><code>+</code></td><td>Suma</td><td><code>5 + 3</code></td><td><code>8</code></td></tr>
        <tr><td><code>-</code></td><td>Resta</td><td><code>5 - 3</code></td><td><code>2</code></td></tr>
        <tr><td><code>*</code></td><td>Multiplicación</td><td><code>5 * 3</code></td><td><code>15</code></td></tr>
        <tr><td><code>/</code></td><td>División</td><td><code>5 / 3</code></td><td><code>1.666…</code></td></tr>
        <tr><td><code>//</code></td><td>División entera</td><td><code>5 // 3</code></td><td><code>1</code></td></tr>
        <tr><td><code>%</code></td><td>Módulo (resto)</td><td><code>5 % 3</code></td><td><code>2</code></td></tr>
        <tr><td><code>**</code></td><td>Potencia</td><td><code>5 ** 3</code></td><td><code>125</code></td></tr>
      </tbody>
    </table></div>
    <div class="callout info"><span class="callout-icon">💡</span><p><code>+</code> también concatena strings: <code>"Hola, " + "Ana"</code> → <code>"Hola, Ana"</code></p></div>

    <h2>Operadores de comparación</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Op.</th><th>Significado</th><th>Ejemplo</th><th>Resultado</th></tr></thead>
      <tbody>
        <tr><td><code>==</code></td><td>Igual a</td><td><code>10 == 7</code></td><td><code>False</code></td></tr>
        <tr><td><code>!=</code></td><td>Distinto de</td><td><code>10 != 7</code></td><td><code>True</code></td></tr>
        <tr><td><code>&gt;</code></td><td>Mayor que</td><td><code>10 &gt; 7</code></td><td><code>True</code></td></tr>
        <tr><td><code>&lt;</code></td><td>Menor que</td><td><code>10 &lt; 7</code></td><td><code>False</code></td></tr>
        <tr><td><code>&gt;=</code></td><td>Mayor o igual</td><td><code>10 &gt;= 10</code></td><td><code>True</code></td></tr>
        <tr><td><code>&lt;=</code></td><td>Menor o igual</td><td><code>10 &lt;= 7</code></td><td><code>False</code></td></tr>
      </tbody>
    </table></div>

    <h2>Operadores lógicos</h2>
    <pre><span class="lt">python</span><code><span class="var">edad</span> = <span class="num">20</span>; <span class="var">tiene_licencia</span> = <span class="builtin">False</span>; <span class="var">es_estudiante</span> = <span class="builtin">True</span>

<span class="cm"># and: las DOS condiciones deben ser True</span>
<span class="fn">print</span>((<span class="var">edad</span> > <span class="num">18</span>) <span class="kw">and</span> <span class="var">tiene_licencia</span>)  <span class="cm"># False</span>

<span class="cm"># or: basta con que UNA sea True</span>
<span class="fn">print</span>((<span class="var">edad</span> < <span class="num">25</span>) <span class="kw">or</span> <span class="var">es_estudiante</span>)   <span class="cm"># True</span>
</code></pre>

    <h2>Asignación combinada y conversión</h2>
    <pre><span class="lt">python</span><code><span class="var">x</span> = <span class="num">10</span>
<span class="var">x</span> += <span class="num">5</span>   <span class="cm"># x = x + 5  → 15</span>
<span class="var">x</span> -= <span class="num">3</span>   <span class="cm"># x = x - 3  → 12</span>
<span class="var">x</span> *= <span class="num">2</span>   <span class="cm"># x = x * 2  → 24</span>

<span class="cm"># Conversión de tipos</span>
<span class="fn">int</span>(<span class="str">"5"</span>)      <span class="cm"># → 5</span>
<span class="fn">float</span>(<span class="str">"3.14"</span>)  <span class="cm"># → 3.14</span>
<span class="fn">str</span>(<span class="num">10</span>)        <span class="cm"># → "10"</span>
<span class="fn">bool</span>(<span class="num">0</span>)        <span class="cm"># → False  (0 y "" son False; lo demás True)</span>
</code></pre>
  </div>

  <!-- S4 Indexación -->
  <div class="sub-sec" id="sub-s4">
    <h2>¿Qué es la indexación?</h2>
    <p>Los strings son <strong>iterables</strong>: cada carácter tiene un índice único. El índice positivo empieza en <code>0</code> (izquierda→derecha) y el negativo en <code>-1</code> (derecha→izquierda).</p>
    <pre><span class="lt">python</span><code><span class="var">s</span> = <span class="str">"Me encanta la programación"</span>
<span class="fn">print</span>(<span class="var">s</span>[<span class="num">0</span>])   <span class="cm"># M  (primer carácter)</span>
<span class="fn">print</span>(<span class="var">s</span>[-<span class="num">1</span>])  <span class="cm"># n  (último carácter)</span>
</code></pre>

    <div class="table-wrap"><table>
      <thead><tr><th>Carácter</th><th>P</th><th>y</th><th>t</th><th>h</th><th>o</th><th>n</th></tr></thead>
      <tbody>
        <tr><td>Índice positivo</td><td><code>0</code></td><td><code>1</code></td><td><code>2</code></td><td><code>3</code></td><td><code>4</code></td><td><code>5</code></td></tr>
        <tr><td>Índice negativo</td><td><code>-6</code></td><td><code>-5</code></td><td><code>-4</code></td><td><code>-3</code></td><td><code>-2</code></td><td><code>-1</code></td></tr>
      </tbody>
    </table></div>

    <h2>Slicing — cadena[start : stop : step]</h2>
    <ul>
      <li><strong>start</strong>: índice de inicio (inclusive).</li>
      <li><strong>stop</strong>: índice de fin (no se incluye en el resultado).</li>
      <li><strong>step</strong>: salto entre caracteres.</li>
    </ul>
    <pre><span class="lt">python</span><code><span class="var">t</span> = <span class="str">"Python"</span>

<span class="fn">print</span>(<span class="var">t</span>[<span class="num">0</span>:<span class="num">4</span>])    <span class="cm"># 'Pyth'    del 0 al 3</span>
<span class="fn">print</span>(<span class="var">t</span>[:<span class="num">3</span>])     <span class="cm"># 'Pyt'     inicio → índice 2</span>
<span class="fn">print</span>(<span class="var">t</span>[<span class="num">3</span>:])     <span class="cm"># 'hon'     índice 3 → final</span>
<span class="fn">print</span>(<span class="var">t</span>[<span class="num">0</span>:<span class="num">6</span>:<span class="num">2</span>])  <span class="cm"># 'Pto'     salto de 2</span>
<span class="fn">print</span>(<span class="var">t</span>[::-<span class="num">1</span>])  <span class="cm"># 'nohtyP'  invertida</span>
</code></pre>
    <div class="callout tip"><span class="callout-icon">✅</span><p><code>[::-1]</code> es la forma más rápida de invertir un string. El step negativo recorre de derecha a izquierda.</p></div>
  </div>

  <!-- S5 Métodos string -->
  <div class="sub-sec" id="sub-s5">
    <h2>Sintaxis general</h2>
    <pre><span class="lt">python</span><code><span class="var">cadena</span>.<span class="fn">metodo</span>(argumentos)</code></pre>
    <p>Los strings son <strong>inmutables</strong>: los métodos no modifican el original, devuelven una <strong>nueva cadena</strong>.</p>

    <h2>Mayúsculas y minúsculas</h2>
    <pre><span class="lt">python</span><code><span class="fn">print</span>(<span class="str">"PYTHON"</span>.<span class="fn">lower</span>())               <span class="cm"># 'python'</span>
<span class="fn">print</span>(<span class="str">"python"</span>.<span class="fn">upper</span>())               <span class="cm"># 'PYTHON'</span>
<span class="fn">print</span>(<span class="str">"bienvenidos a python"</span>.<span class="fn">title</span>())   <span class="cm"># 'Bienvenidos A Python'</span>
<span class="fn">print</span>(<span class="str">"python ES GENIAL"</span>.<span class="fn">capitalize</span>()) <span class="cm"># 'Python es genial'</span>
</code></pre>

    <h2>Métodos de búsqueda y transformación</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Método</th><th>Qué hace</th><th>Si no encuentra</th></tr></thead>
      <tbody>
        <tr><td><code>strip()</code></td><td>Elimina espacios del inicio y fin</td><td>—</td></tr>
        <tr><td><code>replace(old, new)</code></td><td>Reemplaza todas las ocurrencias de <em>old</em> por <em>new</em></td><td>—</td></tr>
        <tr><td><code>find(sub)</code></td><td>Índice de la primera aparición de <em>sub</em></td><td>Devuelve <code>-1</code></td></tr>
        <tr><td><code>index(sub)</code></td><td>Índice de la primera aparición de <em>sub</em></td><td>Lanza <code>ValueError</code></td></tr>
        <tr><td><code>join(lista)</code></td><td>Une los elementos de una lista usando el string como separador</td><td>—</td></tr>
      </tbody>
    </table></div>

    <pre><span class="lt">python</span><code><span class="fn">print</span>(<span class="str">"  Hola  "</span>.<span class="fn">strip</span>())                       <span class="cm"># 'Hola'</span>
<span class="fn">print</span>(<span class="str">"Hola Mundo"</span>.<span class="fn">replace</span>(<span class="str">"Mundo"</span>, <span class="str">"Python"</span>))  <span class="cm"># 'Hola Python'</span>
<span class="fn">print</span>(<span class="str">"Hola Mundo"</span>.<span class="fn">find</span>(<span class="str">"Mundo"</span>))              <span class="cm"># 5</span>
<span class="fn">print</span>(<span class="str">"Hola Mundo"</span>.<span class="fn">find</span>(<span class="str">"Python"</span>))             <span class="cm"># -1</span>
<span class="fn">print</span>(<span class="str">" "</span>.<span class="fn">join</span>([<span class="str">"Python"</span>, <span class="str">"es"</span>, <span class="str">"genial"</span>]))    <span class="cm"># 'Python es genial'</span>
</code></pre>
    <div class="callout info"><span class="callout-icon">💡</span><p>Diferencia clave: <code>find()</code> devuelve <code>-1</code> sin error si no encuentra el substring · <code>index()</code> lanza un <code>ValueError</code>.</p></div>
  </div>

  <!-- S6: Listas -->
  <div class="sub-sec" id="sub-s6">
    <h2>¿Qué es una lista?</h2>
    <p>Una <strong>lista</strong> es una estructura de datos que permite almacenar <strong>múltiples elementos dentro de una sola variable</strong>. Los elementos pueden ser de distintos tipos (números, strings, booleanos, incluso otras listas) y se pueden modificar después de crearla — las listas son <strong>mutables</strong>.</p>

    <h2>Crear una lista</h2>
    <pre><span class="lt">python</span><code><span class="cm"># Con corchetes [] separando elementos con comas</span>
<span class="var">mi_lista</span> = [<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>, <span class="str">"Python"</span>, <span class="builtin">True</span>]
<span class="fn">print</span>(<span class="var">mi_lista</span>)  <span class="cm"># [1, 2, 3, 'Python', True]</span>

<span class="cm"># Lista vacía (para añadir elementos después)</span>
<span class="var">lista_vacia</span> = []

<span class="cm"># Longitud con len()</span>
<span class="fn">print</span>(<span class="fn">len</span>(<span class="var">mi_lista</span>))  <span class="cm"># 5</span>

<span class="cm"># Convertir un string en lista de caracteres</span>
<span class="var">lista</span> = <span class="fn">list</span>(<span class="str">"Python"</span>)
<span class="fn">print</span>(<span class="var">lista</span>)  <span class="cm"># ['P', 'y', 't', 'h', 'o', 'n']</span></code></pre>

    <h2>Indexación — acceder a elementos</h2>
    <p>Igual que en los strings, los índices empiezan en <code>0</code>. También funcionan los índices negativos:</p>
    <pre><span class="lt">python</span><code><span class="var">mi_lista</span> = [<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>, <span class="str">"Python"</span>, <span class="builtin">True</span>]

<span class="fn">print</span>(<span class="var">mi_lista</span>[<span class="num">0</span>])   <span class="cm"># 1       (primero)</span>
<span class="fn">print</span>(<span class="var">mi_lista</span>[<span class="num">3</span>])   <span class="cm"># 'Python'</span>
<span class="fn">print</span>(<span class="var">mi_lista</span>[-<span class="num">1</span>])  <span class="cm"># True    (último)</span></code></pre>

    <h2>Slicing — sublistas con rango [start:stop:step]</h2>
    <pre><span class="lt">python</span><code><span class="var">mi_lista</span> = [<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>, <span class="num">4</span>, <span class="num">5</span>, <span class="num">6</span>]

<span class="fn">print</span>(<span class="var">mi_lista</span>[<span class="num">1</span>:<span class="num">4</span>])   <span class="cm"># [2, 3, 4]   del índice 1 al 3</span>
<span class="fn">print</span>(<span class="var">mi_lista</span>[:<span class="num">4</span>])    <span class="cm"># [1, 2, 3, 4] desde el inicio</span>
<span class="fn">print</span>(<span class="var">mi_lista</span>[<span class="num">2</span>:])    <span class="cm"># [3, 4, 5, 6] hasta el final</span>
<span class="fn">print</span>(<span class="var">mi_lista</span>[-<span class="num">3</span>:])   <span class="cm"># [4, 5, 6]   últimos 3 elementos</span></code></pre>

    <h2>Listas anidadas</h2>
    <p>Una lista puede contener otras listas. Para acceder a elementos de una lista anidada, encadenas índices:</p>
    <pre><span class="lt">python</span><code><span class="var">anidada</span> = [<span class="num">1</span>, [<span class="num">2</span>, <span class="num">3</span>], [<span class="num">4</span>, [<span class="num">5</span>, <span class="num">6</span>]]]

<span class="fn">print</span>(<span class="var">anidada</span>[<span class="num">1</span>])          <span class="cm"># [2, 3]</span>
<span class="fn">print</span>(<span class="var">anidada</span>[<span class="num">1</span>][<span class="num">0</span>])       <span class="cm"># 2</span>
<span class="fn">print</span>(<span class="var">anidada</span>[<span class="num">2</span>][<span class="num">1</span>][<span class="num">0</span>])    <span class="cm"># 5  (dentro de la lista más profunda)</span></code></pre>

    <div class="callout tip">
      <span class="callout-icon">✅</span>
      <p>Las listas son <strong>mutables</strong> (se pueden modificar) al contrario que los strings. Puedes cambiar un elemento directamente: <code>mi_lista[0] = 99</code>.</p>
    </div>
  </div>

  <!-- S7: Métodos de listas -->
  <div class="sub-sec" id="sub-s7">
    <h2>Métodos generales</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Método</th><th>Qué hace</th><th>Modifica la original</th></tr></thead>
      <tbody>
        <tr><td><code>len(lista)</code></td><td>Devuelve el número de elementos</td><td>❌</td></tr>
        <tr><td><code>max(lista)</code></td><td>Devuelve el valor máximo</td><td>❌</td></tr>
        <tr><td><code>min(lista)</code></td><td>Devuelve el valor mínimo</td><td>❌</td></tr>
        <tr><td><code>sorted(lista)</code></td><td>Devuelve una <strong>nueva</strong> lista ordenada</td><td>❌</td></tr>
        <tr><td><code>lista.sort()</code></td><td>Ordena la lista en su lugar</td><td>✅</td></tr>
        <tr><td><code>lista.copy()</code></td><td>Devuelve una copia superficial</td><td>❌</td></tr>
        <tr><td><code>lista.count(x)</code></td><td>Cuenta las veces que aparece <code>x</code></td><td>❌</td></tr>
        <tr><td><code>lista.reverse()</code></td><td>Invierte el orden de los elementos</td><td>✅</td></tr>
      </tbody>
    </table></div>

    <pre><span class="lt">python</span><code><span class="var">mi_lista</span> = [<span class="num">3</span>, <span class="num">1</span>, <span class="num">4</span>, <span class="num">2</span>]

<span class="fn">print</span>(<span class="fn">len</span>(<span class="var">mi_lista</span>))         <span class="cm"># 4</span>
<span class="fn">print</span>(<span class="fn">max</span>(<span class="var">mi_lista</span>))         <span class="cm"># 4</span>
<span class="fn">print</span>(<span class="fn">min</span>(<span class="var">mi_lista</span>))         <span class="cm"># 1</span>
<span class="fn">print</span>(<span class="fn">sorted</span>(<span class="var">mi_lista</span>))      <span class="cm"># [1, 2, 3, 4] — original intacta</span>
<span class="fn">print</span>(<span class="var">mi_lista</span>)              <span class="cm"># [3, 1, 4, 2] — sigue igual</span>

<span class="var">mi_lista</span>.<span class="fn">sort</span>()
<span class="fn">print</span>(<span class="var">mi_lista</span>)              <span class="cm"># [1, 2, 3, 4] — original modificada</span>

<span class="var">mi_lista</span>.<span class="fn">reverse</span>()
<span class="fn">print</span>(<span class="var">mi_lista</span>)              <span class="cm"># [4, 3, 2, 1]</span>

<span class="var">lista2</span> = [<span class="num">1</span>, <span class="num">2</span>, <span class="num">2</span>, <span class="num">3</span>]
<span class="fn">print</span>(<span class="var">lista2</span>.<span class="fn">count</span>(<span class="num">2</span>))       <span class="cm"># 2 (aparece dos veces)</span></code></pre>

    <div class="callout warn">
      <span class="callout-icon">⚠️</span>
      <p>Diferencia clave entre <code>sorted()</code> y <code>.sort()</code>: <code>sorted()</code> crea una nueva lista (la original no cambia), mientras que <code>.sort()</code> modifica la lista original directamente.</p>
    </div>

    <h2>Métodos de adición</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Método</th><th>Qué hace</th><th>Ejemplo</th><th>Resultado</th></tr></thead>
      <tbody>
        <tr><td><code>append(x)</code></td><td>Añade <code>x</code> al <strong>final</strong></td><td><code>[1,2].append(3)</code></td><td><code>[1, 2, 3]</code></td></tr>
        <tr><td><code>extend([x,y])</code></td><td>Añade todos los elementos de otra lista al final</td><td><code>[1,2].extend([3,4])</code></td><td><code>[1, 2, 3, 4]</code></td></tr>
        <tr><td><code>insert(i, x)</code></td><td>Inserta <code>x</code> en la posición <code>i</code></td><td><code>[1,3,4].insert(1, 2)</code></td><td><code>[1, 2, 3, 4]</code></td></tr>
      </tbody>
    </table></div>

    <pre><span class="lt">python</span><code><span class="var">lista</span> = [<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>]

<span class="var">lista</span>.<span class="fn">append</span>(<span class="num">4</span>)
<span class="fn">print</span>(<span class="var">lista</span>)          <span class="cm"># [1, 2, 3, 4]</span>

<span class="var">lista</span>.<span class="fn">extend</span>([<span class="num">5</span>, <span class="num">6</span>])
<span class="fn">print</span>(<span class="var">lista</span>)          <span class="cm"># [1, 2, 3, 4, 5, 6]</span>

<span class="var">lista</span>.<span class="fn">insert</span>(<span class="num">0</span>, <span class="num">0</span>)    <span class="cm"># inserta 0 en la posición 0</span>
<span class="fn">print</span>(<span class="var">lista</span>)          <span class="cm"># [0, 1, 2, 3, 4, 5, 6]</span></code></pre>

    <div class="callout info">
      <span class="callout-icon">💡</span>
      <p>Diferencia entre <code>append()</code> y <code>extend()</code>: <code>append([3,4])</code> añade la lista como un único elemento → <code>[1, 2, [3, 4]]</code>; <code>extend([3,4])</code> desempaqueta y añade cada elemento por separado → <code>[1, 2, 3, 4]</code>.</p>
    </div>

    <h2>Métodos de eliminación</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Método</th><th>Qué elimina</th><th>Devuelve</th><th>Error si no existe</th></tr></thead>
      <tbody>
        <tr><td><code>pop()</code></td><td>El último elemento (o el de índice i con <code>pop(i)</code>)</td><td>✅ El elemento eliminado</td><td>❌ No</td></tr>
        <tr><td><code>remove(x)</code></td><td>La primera aparición de <code>x</code></td><td>❌ No devuelve nada</td><td>✅ Sí, ValueError</td></tr>
        <tr><td><code>clear()</code></td><td>Todos los elementos</td><td>❌ No</td><td>❌ No</td></tr>
      </tbody>
    </table></div>

    <pre><span class="lt">python</span><code><span class="var">lista</span> = [<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>, <span class="num">2</span>]

<span class="cm"># pop() — elimina el último y lo devuelve</span>
<span class="var">ultimo</span> = <span class="var">lista</span>.<span class="fn">pop</span>()
<span class="fn">print</span>(<span class="var">ultimo</span>)  <span class="cm"># 2</span>
<span class="fn">print</span>(<span class="var">lista</span>)   <span class="cm"># [1, 2, 3]</span>

<span class="cm"># remove() — elimina la primera aparición del valor</span>
<span class="var">lista</span>.<span class="fn">remove</span>(<span class="num">2</span>)
<span class="fn">print</span>(<span class="var">lista</span>)   <span class="cm"># [1, 3]</span>

<span class="cm"># clear() — vacía la lista</span>
<span class="var">lista</span>.<span class="fn">clear</span>()
<span class="fn">print</span>(<span class="var">lista</span>)   <span class="cm"># []</span></code></pre>
  </div>
</template>

<!-- ══════════════════════════════════════
     SQL — LECCIÓN 1: FUNDAMENTOS
══════════════════════════════════════ -->
<template id="tpl-sql_fund">
  <div class="topic-header">
    <div class="th-eyebrow">Módulo 5 · SQL · Lección 1</div>
    <div class="th-title">Fundamentos de <em>SQL</em></div>
    <p class="th-desc">Qué es una base de datos, sus tipos, componentes y relaciones entre tablas.</p>
  </div>

  <h2>¿Qué es una base de datos?</h2>
  <p>Una <strong>base de datos (BBDD)</strong> es un sistema estructurado que permite almacenar, gestionar y recuperar grandes volúmenes de datos de manera eficiente. Su objetivo principal es organizar los datos para que su acceso sea rápido y seguro, garantizando su integridad y coherencia.</p>

  <h2>Tipos de bases de datos</h2>
  <h3>1. Bases de datos relacionales</h3>
  <p>Las más utilizadas. Organizan la información en <strong>tablas</strong> (también llamadas relaciones) formadas por <strong>filas</strong> (registros) y <strong>columnas</strong> (atributos o campos).</p>
  <p>Las tablas se relacionan entre sí mediante <strong>llaves primarias</strong> y <strong>llaves foráneas</strong>. Por ejemplo, en una tienda: la tabla <em>Clientes</em> tiene un ID único (Primary Key), y la tabla <em>Pedidos</em> usa ese mismo ID como referencia (Foreign Key).</p>
  <div class="callout info">
    <span class="callout-icon">🗄️</span>
    <p>Bases de datos relacionales comunes: <strong>MySQL, PostgreSQL, SQL Server, Oracle</strong>.</p>
  </div>

  <h3>2. Bases de datos no relacionales (NoSQL)</h3>
  <p>No siguen el esquema de tablas tradicional. Están diseñadas para gestionar grandes volúmenes de datos no estructurados o semiestructurados, y permiten flexibilidad cuando la estructura cambia con frecuencia.</p>
  <div class="callout info">
    <span class="callout-icon">📦</span>
    <p>Bases de datos NoSQL comunes: <strong>MongoDB, Cassandra, Redis</strong>.</p>
  </div>

  <h2>Componentes principales de una BD relacional</h2>
  <div class="table-wrap"><table>
    <thead><tr><th>Componente</th><th>Descripción</th></tr></thead>
    <tbody>
      <tr><td><strong>Tabla</strong></td><td>Núcleo de la BD. Contiene datos sobre una entidad específica (ej. "Clientes").</td></tr>
      <tr><td><strong>Primary Key</strong></td><td>Campo que identifica de forma única cada registro. No puede repetirse ni ser nulo.</td></tr>
      <tr><td><strong>Foreign Key</strong></td><td>Campo que referencia la Primary Key de otra tabla, creando la relación entre ambas.</td></tr>
    </tbody>
  </table></div>

  <h2>Tipos de relaciones entre tablas</h2>
  <div class="table-wrap"><table>
    <thead><tr><th>Tipo</th><th>Descripción</th><th>Ejemplo</th></tr></thead>
    <tbody>
      <tr><td><strong>Uno a uno (1:1)</strong></td><td>Cada registro de una tabla se asocia con uno único de otra.</td><td>Empleado ↔ Carnet de identidad</td></tr>
      <tr><td><strong>Uno a muchos (1:N)</strong></td><td>Un registro se relaciona con varios de otra tabla.</td><td>Cliente → varios Pedidos</td></tr>
      <tr><td><strong>Muchos a muchos (N:N)</strong></td><td>Varios registros de ambas tablas se relacionan entre sí. Requiere tabla intermedia.</td><td>Estudiantes ↔ Cursos</td></tr>
    </tbody>
  </table></div>

  <h2>Ventajas de usar una base de datos</h2>
  <ul>
    <li><strong>Organización eficiente:</strong> datos divididos en tablas relacionadas, sin redundancias.</li>
    <li><strong>Acceso rápido:</strong> gracias a las claves y la estructura optimizada.</li>
    <li><strong>Seguridad:</strong> control de acceso, solo usuarios autorizados ven los datos.</li>
    <li><strong>Integridad:</strong> las relaciones se mantienen correctamente (no hay registros huérfanos).</li>
  </ul>
</template>

<!-- ══════════════════════════════════════
     SQL — LECCIÓN 2: CONSULTAS BÁSICAS
     subtabs: SELECT/FROM · WHERE · AS
══════════════════════════════════════ -->
<template id="tpl-sql_basicas">
  <div class="topic-header">
    <div class="th-eyebrow">Módulo 5 · SQL · Lección 2</div>
    <div class="th-title">Consultas <em>Básicas</em></div>
    <p class="th-desc">Los comandos fundamentales para extraer y filtrar datos: SELECT, FROM, WHERE y AS.</p>
  </div>

  <div class="subtab-nav">
    <button class="stab active" data-sub="sq1">1. SELECT y FROM</button>
    <button class="stab" data-sub="sq2">2. WHERE</button>
    <button class="stab" data-sub="sq3">3. AS</button>
  </div>

  <!-- SQ1: SELECT y FROM -->
  <div class="sub-sec on" id="sub-sq1">
    <h2>SELECT y FROM</h2>
    <p><strong>SELECT</strong> especifica qué columnas queremos recuperar. <strong>FROM</strong> indica de qué tabla. Juntos forman la base de cualquier consulta:</p>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="str">"nombre"</span>, <span class="str">"apellido"</span>
<span class="kw">FROM</span> <span class="str">"clientes"</span>;</code></pre>

    <h2>¿Qué es una consulta (Query)?</h2>
    <p>Una <strong>consulta</strong> o <strong>query</strong> es una instrucción SQL para interactuar con la base de datos: obtener datos, actualizar registros, insertar o eliminar información.</p>

    <h2>Cómo abrir un script en DBeaver (PostgreSQL)</h2>
    <ol>
      <li>Abrir <strong>DBeaver</strong> y seleccionar la conexión de <strong>PostgreSQL</strong>.</li>
      <li>Clic derecho sobre la conexión → <strong>SQL Editor</strong> → <strong>New SQL Script</strong>.</li>
    </ol>

    <h2>Buenas prácticas en SQL</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>#</th><th>Práctica</th><th>Ejemplo</th></tr></thead>
      <tbody>
        <tr><td>1</td><td>Comandos en <strong>MAYÚSCULAS</strong></td><td><code>SELECT</code>, <code>FROM</code>, <code>WHERE</code></td></tr>
        <tr><td>2</td><td>Terminar cada consulta con <strong>;</strong></td><td><code>FROM "clientes";</code></td></tr>
        <tr><td>3</td><td>Comillas <strong>dobles</strong> para nombres de tablas y columnas</td><td><code>"nombre"</code>, <code>"clientes"</code></td></tr>
        <tr><td>4</td><td>Evitar <code>SELECT *</code> — especifica solo las columnas necesarias</td><td><code>SELECT "nombre", "edad"</code></td></tr>
      </tbody>
    </table></div>

    <h2>Seleccionar varias columnas</h2>
    <p>Enumera las columnas separadas por comas. El <strong>orden importa</strong>: determina cómo se presentan los resultados.</p>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="str">"nombre"</span>, <span class="str">"apellido"</span>, <span class="str">"correo"</span>
<span class="kw">FROM</span> <span class="str">"clientes"</span>;</code></pre>

    <h2>Comentarios en SQL</h2>
    <pre><span class="lt">sql</span><code><span class="cm">-- Comentario de una sola línea</span>
<span class="kw">SELECT</span> <span class="str">"nombre"</span>, <span class="str">"apellido"</span>
<span class="kw">FROM</span> <span class="str">"clientes"</span>;

<span class="cm">/* Comentario
   multilínea */</span>
<span class="kw">SELECT</span> <span class="str">"nombre"</span>
<span class="kw">FROM</span> <span class="str">"clientes"</span>;</code></pre>
  </div>

  <!-- SQ2: WHERE -->
  <div class="sub-sec" id="sub-sq2">
    <h2>WHERE — Filtrar filas</h2>
    <p>El comando <strong>WHERE</strong> restringe los resultados devolviendo solo las filas que cumplen una condición:</p>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="str">"nombre"</span>, <span class="str">"apellido"</span>
<span class="kw">FROM</span> <span class="str">"clientes"</span>
<span class="kw">WHERE</span> <span class="str">"ciudad"</span> = <span class="str">'Madrid'</span>;</code></pre>
    <div class="callout warn">
      <span class="callout-icon">⚠️</span>
      <p>Los <strong>valores de texto y fechas</strong> van entre <strong>comillas simples</strong> <code>' '</code>. Las comillas dobles se reservan para nombres de columnas y tablas.</p>
    </div>

    <h2>Operadores de comparación</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Operador</th><th>Significado</th><th>Ejemplo</th></tr></thead>
      <tbody>
        <tr><td><code>=</code></td><td>Igual a</td><td><code>WHERE "edad" = 25</code></td></tr>
        <tr><td><code>&gt;</code> / <code>&lt;</code></td><td>Mayor / menor que</td><td><code>WHERE "precio" &gt; 100</code></td></tr>
        <tr><td><code>&gt;=</code> / <code>&lt;=</code></td><td>Mayor o igual / menor o igual</td><td><code>WHERE "edad" &gt;= 18</code></td></tr>
        <tr><td><code>&lt;&gt;</code></td><td>Distinto de</td><td><code>WHERE "categoria" &lt;&gt; 'Electrónica'</code></td></tr>
      </tbody>
    </table></div>

    <h2>AND y OR</h2>
    <pre><span class="lt">sql</span><code><span class="cm">-- AND: deben cumplirse TODAS las condiciones</span>
<span class="kw">SELECT</span> <span class="str">"nombre"</span>, <span class="str">"apellido"</span>
<span class="kw">FROM</span> <span class="str">"clientes"</span>
<span class="kw">WHERE</span> <span class="str">"pais"</span> = <span class="str">'España'</span>
<span class="kw">AND</span> <span class="str">"edad"</span> > <span class="num">30</span>;

<span class="cm">-- OR: basta con que se cumpla UNA condición</span>
<span class="kw">SELECT</span> <span class="str">"nombre"</span>, <span class="str">"pais"</span>
<span class="kw">FROM</span> <span class="str">"clientes"</span>
<span class="kw">WHERE</span> <span class="str">"pais"</span> = <span class="str">'España'</span>
<span class="kw">OR</span> <span class="str">"pais"</span> = <span class="str">'México'</span>;</code></pre>

    <h2>IN y NOT IN</h2>
    <pre><span class="lt">sql</span><code><span class="cm">-- IN: incluir varios valores en una sola condición</span>
<span class="kw">WHERE</span> <span class="str">"pais"</span> <span class="kw">IN</span> (<span class="str">'España'</span>, <span class="str">'México'</span>, <span class="str">'Argentina'</span>);

<span class="cm">-- NOT IN: excluir esos valores</span>
<span class="kw">WHERE</span> <span class="str">"pais"</span> <span class="kw">NOT IN</span> (<span class="str">'España'</span>, <span class="str">'México'</span>);</code></pre>

    <h2>BETWEEN</h2>
    <p>Selecciona valores dentro de un rango (los extremos se incluyen):</p>
    <pre><span class="lt">sql</span><code><span class="cm">-- Rango numérico</span>
<span class="kw">WHERE</span> <span class="str">"edad"</span> <span class="kw">BETWEEN</span> <span class="num">25</span> <span class="kw">AND</span> <span class="num">40</span>;

<span class="cm">-- Rango de fechas</span>
<span class="kw">WHERE</span> <span class="str">"fecha_pedido"</span> <span class="kw">BETWEEN</span> <span class="str">'2023-01-01'</span> <span class="kw">AND</span> <span class="str">'2023-12-31'</span>;</code></pre>

    <h2>Filtrar por año con YEAR()</h2>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="str">"id_pedido"</span>, <span class="str">"fecha_pedido"</span>
<span class="kw">FROM</span> <span class="str">"pedidos"</span>
<span class="kw">WHERE</span> <span class="fn">YEAR</span>(<span class="str">"fecha_pedido"</span>) = <span class="num">2023</span>;</code></pre>

    <h2>Búsqueda de patrones: LIKE e ILIKE</h2>
    <p>Cuando no buscas un valor exacto sino un texto que "se parezca" a algo:</p>
    <div class="table-wrap"><table>
      <thead><tr><th>Comodín</th><th>Significado</th></tr></thead>
      <tbody>
        <tr><td><code>%</code></td><td>Cualquier cantidad de caracteres</td></tr>
        <tr><td><code>_</code></td><td>Exactamente un solo carácter</td></tr>
      </tbody>
    </table></div>
    <pre><span class="lt">sql</span><code><span class="cm">-- Nombres que empiecen por 'An' (Ana, Antonio…)</span>
<span class="kw">WHERE</span> <span class="str">"nombre"</span> <span class="kw">LIKE</span> <span class="str">'An%'</span>;

<span class="cm">-- Correos que contengan 'gmail'</span>
<span class="kw">WHERE</span> <span class="str">"email"</span> <span class="kw">LIKE</span> <span class="str">'%gmail%'</span>;</code></pre>
    <div class="callout tip">
      <span class="callout-icon">💡</span>
      <p><strong>Tip PostgreSQL:</strong> usa <code>ILIKE</code> en lugar de <code>LIKE</code> para que la búsqueda ignore mayúsculas y minúsculas.</p>
    </div>
  </div>

  <!-- SQ3: AS -->
  <div class="sub-sec" id="sub-sq3">
    <h2>AS — Alias</h2>
    <p>El comando <strong>AS</strong> asigna un <strong>nombre temporal</strong> (alias) a una columna o tabla dentro de una consulta. Es útil para hacer los resultados más claros y legibles, especialmente en consultas complejas.</p>

    <h2>¿Para qué sirve AS?</h2>
    <ul>
      <li><strong>Renombrar columnas o tablas</strong>: dar nombres más significativos o abreviados.</li>
      <li><strong>Clarificar consultas complejas</strong>: más fácil de leer y entender.</li>
      <li><strong>Mejorar la presentación</strong>: los resultados se muestran con el nombre del alias.</li>
    </ul>

    <h2>Alias para columnas</h2>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="str">"nombre"</span>, <span class="str">"apellido"</span>, <span class="str">"edad"</span> <span class="kw">AS</span> <span class="str">"años"</span>
<span class="kw">FROM</span> <span class="str">"clientes"</span>;</code></pre>
    <p>La columna <code>"edad"</code> aparecerá en los resultados con el nombre <code>"años"</code>.</p>

    <h2>Alias para tablas</h2>
    <p>Especialmente útil cuando trabajamos con varias tablas o subconsultas:</p>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="str">"c"</span>.<span class="str">"nombre"</span>
<span class="kw">FROM</span> <span class="str">"clientes"</span> <span class="kw">AS</span> <span class="str">"c"</span>;</code></pre>

    <div class="callout tip">
      <span class="callout-icon">✅</span>
      <p>Los alias son temporales: solo existen durante la ejecución de esa consulta. No modifican el nombre real de la columna ni de la tabla en la base de datos.</p>
    </div>
  </div>
</template>

<!-- ══════════════════════════════════════
     SQL — LECCIÓN 3: CONSULTAS DE AGREGACIÓN
     subtabs: MIN/MAX · COUNT/SUM · AVG/STDDEV/VARIANCE · CONCAT
══════════════════════════════════════ -->
<template id="tpl-sql_agr">
  <div class="topic-header">
    <div class="th-eyebrow">Módulo 5 · SQL · Lección 3</div>
    <div class="th-title">Consultas de <em>Agregación</em></div>
    <p class="th-desc">Funciones que calculan un único valor a partir de múltiples filas: MIN, MAX, COUNT, SUM, AVG, STDDEV, VARIANCE y CONCAT.</p>
  </div>

  <div class="subtab-nav">
    <button class="stab active" data-sub="ag1">MIN y MAX</button>
    <button class="stab" data-sub="ag2">COUNT y SUM</button>
    <button class="stab" data-sub="ag3">AVG · STDDEV · VARIANCE</button>
    <button class="stab" data-sub="ag4">CONCAT</button>
  </div>

  <!-- AG1: MIN y MAX -->
  <div class="sub-sec on" id="sub-ag1">
    <h2>¿Qué son las funciones de agregación?</h2>
    <p>Las <strong>funciones de agregación</strong> toman múltiples filas como entrada y devuelven <strong>un único valor</strong> como resultado. Son esenciales para resumir grandes volúmenes de datos de manera eficiente.</p>
    <div class="callout info">
      <span class="callout-icon">📊</span>
      <p>Las más comunes son: <strong>MIN, MAX, COUNT, SUM, AVG</strong> — y para estadística: <strong>STDDEV</strong> y <strong>VARIANCE</strong>.</p>
    </div>

    <h2>MIN — Valor mínimo</h2>
    <p>Devuelve el valor <strong>más pequeño</strong> de una columna (numérica, texto o fecha):</p>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="fn">MIN</span>(<span class="str">"salario"</span>) <span class="kw">AS</span> <span class="str">"salario_minimo"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>;</code></pre>

    <h2>MAX — Valor máximo</h2>
    <p>Devuelve el valor <strong>más grande</strong> de una columna:</p>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="fn">MAX</span>(<span class="str">"salario"</span>) <span class="kw">AS</span> <span class="str">"salario_maximo"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>;</code></pre>

    <h2>MIN y MAX con fechas y texto</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Tipo de dato</th><th>MIN devuelve</th><th>MAX devuelve</th></tr></thead>
      <tbody>
        <tr><td>Números</td><td>El valor más pequeño</td><td>El valor más grande</td></tr>
        <tr><td>Fechas</td><td>La fecha más antigua</td><td>La fecha más reciente</td></tr>
        <tr><td>Texto</td><td>El primero en orden alfabético</td><td>El último en orden alfabético</td></tr>
      </tbody>
    </table></div>

    <div class="callout warn">
      <span class="callout-icon">⚠️</span>
      <p>No puedes combinar una función de agregación con columnas normales sin usar <strong>GROUP BY</strong>. Esto da error:</p>
    </div>
    <pre><span class="lt">sql — ERROR</span><code><span class="cm">-- ❌ Esto falla: mezcla columna completa con agregación</span>
<span class="kw">SELECT</span> <span class="str">"nombre"</span>, <span class="fn">MAX</span>(<span class="str">"salario"</span>)
<span class="kw">FROM</span> <span class="str">"empleados"</span>;

<span class="cm">-- ✅ Correcto: solo la función de agregación</span>
<span class="kw">SELECT</span> <span class="fn">MAX</span>(<span class="str">"salario"</span>) <span class="kw">AS</span> <span class="str">"salario_maximo"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>;</code></pre>
  </div>

  <!-- AG2: COUNT y SUM -->
  <div class="sub-sec" id="sub-ag2">
    <h2>COUNT — Contar filas</h2>
    <p>Cuenta la cantidad de filas o valores en una columna. Tiene varias variantes según lo que necesites contar:</p>

    <div class="table-wrap"><table>
      <thead><tr><th>Variante</th><th>Qué cuenta</th></tr></thead>
      <tbody>
        <tr><td><code>COUNT(*)</code></td><td>Todas las filas, incluidas las que tienen NULL</td></tr>
        <tr><td><code>COUNT(columna)</code></td><td>Solo filas donde esa columna <strong>no sea NULL</strong></td></tr>
        <tr><td><code>COUNT(DISTINCT columna)</code></td><td>Solo valores <strong>únicos</strong>, omitiendo duplicados y NULL</td></tr>
      </tbody>
    </table></div>

    <pre><span class="lt">sql</span><code><span class="cm">-- Total de empleados (todas las filas)</span>
<span class="kw">SELECT</span> <span class="fn">COUNT</span>(*) <span class="kw">AS</span> <span class="str">"total_empleados"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>;

<span class="cm">-- Empleados con edad registrada (excluye NULL)</span>
<span class="kw">SELECT</span> <span class="fn">COUNT</span>(<span class="str">"edad"</span>) <span class="kw">AS</span> <span class="str">"empleados_con_edad"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>;

<span class="cm">-- Número de departamentos distintos</span>
<span class="kw">SELECT</span> <span class="fn">COUNT</span>(<span class="kw">DISTINCT</span> <span class="str">"departamento"</span>) <span class="kw">AS</span> <span class="str">"departamentos_unicos"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>;

<span class="cm">-- Empleados con salario registrado</span>
<span class="kw">SELECT</span> <span class="fn">COUNT</span>(*) <span class="kw">AS</span> <span class="str">"empleados_con_salario"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>
<span class="kw">WHERE</span> <span class="str">"salario"</span> <span class="kw">IS NOT NULL</span>;</code></pre>

    <h2>SUM — Suma total</h2>
    <p>Calcula la <strong>suma total</strong> de los valores de una columna numérica. Los valores NULL se ignoran (no se tratan como 0).</p>
    <pre><span class="lt">sql</span><code><span class="cm">-- Suma total de salarios</span>
<span class="kw">SELECT</span> <span class="fn">SUM</span>(<span class="str">"salario"</span>) <span class="kw">AS</span> <span class="str">"suma_salarios"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>;

<span class="cm">-- Suma excluyendo NULL explícitamente</span>
<span class="kw">SELECT</span> <span class="fn">SUM</span>(<span class="str">"salario"</span>) <span class="kw">AS</span> <span class="str">"suma_validos"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>
<span class="kw">WHERE</span> <span class="str">"salario"</span> <span class="kw">IS NOT NULL</span>;

<span class="cm">-- Suma de valores únicos</span>
<span class="kw">SELECT</span> <span class="fn">SUM</span>(<span class="kw">DISTINCT</span> <span class="str">"salario"</span>) <span class="kw">AS</span> <span class="str">"suma_unicos"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>;</code></pre>

    <div class="callout tip">
      <span class="callout-icon">✅</span>
      <p><strong>Resumen:</strong> <code>COUNT</code> cuenta filas · <code>SUM</code> suma valores numéricos. Ambas ignoran NULL (salvo <code>COUNT(*)</code>).</p>
    </div>
  </div>

  <!-- AG3: AVG, STDDEV, VARIANCE -->
  <div class="sub-sec" id="sub-ag3">
    <h2>AVG — Promedio</h2>
    <p>Calcula el <strong>promedio</strong> de los valores de una columna numérica. Ignora los valores NULL y divide la suma entre el número de valores no nulos.</p>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="fn">AVG</span>(<span class="str">"salario"</span>)
<span class="kw">FROM</span> <span class="str">"empleados"</span>;</code></pre>

    <h2>ROUND — Redondear el resultado</h2>
    <p>Para redondear el resultado de AVG a un número concreto de decimales:</p>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="fn">ROUND</span>(<span class="fn">AVG</span>(<span class="str">"salario"</span>), <span class="num">2</span>) <span class="kw">AS</span> <span class="str">"promedio_redondeado"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>;</code></pre>

    <h2>STDDEV — Desviación estándar</h2>
    <p>Mide <strong>cuánto se alejan los valores de la media</strong>. Cuanto mayor sea el valor, más dispersos están los datos:</p>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="fn">STDDEV</span>(<span class="str">"salario"</span>) <span class="kw">AS</span> <span class="str">"desviacion_salarial"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>;</code></pre>

    <h2>VARIANCE — Varianza</h2>
    <p>Calcula la <strong>varianza</strong> (el cuadrado de la desviación estándar). Indica la variabilidad de los datos alrededor del promedio:</p>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="fn">VARIANCE</span>(<span class="str">"salario"</span>) <span class="kw">AS</span> <span class="str">"varianza_salarial"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>;</code></pre>

    <div class="table-wrap"><table>
      <thead><tr><th>Función</th><th>Qué mide</th><th>Ignora NULL</th></tr></thead>
      <tbody>
        <tr><td><code>AVG</code></td><td>Promedio de los valores</td><td>✅ Sí</td></tr>
        <tr><td><code>ROUND(AVG(), n)</code></td><td>Promedio redondeado a <em>n</em> decimales</td><td>✅ Sí</td></tr>
        <tr><td><code>STDDEV</code></td><td>Dispersión respecto a la media</td><td>✅ Sí</td></tr>
        <tr><td><code>VARIANCE</code></td><td>Variabilidad (= STDDEV²)</td><td>✅ Sí</td></tr>
      </tbody>
    </table></div>
  </div>

  <!-- AG4: CONCAT -->
  <div class="sub-sec" id="sub-ag4">
    <h2>CONCAT — Unir cadenas de texto</h2>
    <p>La función <strong>CONCAT</strong> une varias cadenas de texto en una sola. Es muy útil para combinar columnas y crear valores de salida más claros y legibles.</p>

    <h2>Sintaxis</h2>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="fn">CONCAT</span>(columna1, columna2, ...) <span class="kw">AS</span> <span class="str">"resultado"</span>
<span class="kw">FROM</span> tabla;</code></pre>

    <h2>Ejemplo: nombre completo</h2>
    <p>Unimos la columna <code>"nombre"</code>, un espacio y la columna <code>"apellido"</code>:</p>
    <pre><span class="lt">sql</span><code><span class="kw">SELECT</span> <span class="fn">CONCAT</span>(<span class="str">"nombre"</span>, <span class="str">' '</span>, <span class="str">"apellido"</span>) <span class="kw">AS</span> <span class="str">"nombre_completo"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>;</code></pre>

    <h2>CONCAT y valores NULL</h2>
    <p>Si alguna columna contiene <code>NULL</code>, CONCAT lo trata como una <strong>cadena vacía</strong>. No genera error, simplemente lo omite:</p>
    <pre><span class="lt">sql</span><code><span class="cm">-- NULL se omite silenciosamente</span>
<span class="kw">SELECT</span> <span class="fn">CONCAT</span>(<span class="str">"nombre"</span>, <span class="str">"apellido"</span>, <span class="builtin">NULL</span>) <span class="kw">AS</span> <span class="str">"resultado"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>;</code></pre>

    <div class="callout info">
      <span class="callout-icon">💡</span>
      <p>CONCAT es esencial para <strong>formatear resultados</strong>, mostrar información más clara o crear nuevos valores a partir de columnas existentes.</p>
    </div>
    <div class="callout warn">
      <span class="callout-icon">⚠️</span>
      <p>Recuerda añadir separadores explícitos (<code>' '</code>, <code>', '</code>…) entre columnas, ya que CONCAT no añade espacios automáticamente.</p>
    </div>
  </div>
</template>

<!-- ══════════════════════════════════════
     SQL — LECCIÓN 4: ORDENACIÓN Y AGRUPACIÓN
     subtabs: ORDER BY · LIMIT/OFFSET · GROUP BY/HAVING
══════════════════════════════════════ -->
<template id="tpl-sql_ord">
  <div class="topic-header">
    <div class="th-eyebrow">Módulo 5 · SQL · Lección 4</div>
    <div class="th-title">Ordenación y <em>Agrupación</em></div>
    <p class="th-desc">Controla el orden, limita resultados y agrupa datos: ORDER BY, LIMIT, OFFSET, GROUP BY y HAVING.</p>
  </div>

  <div class="subtab-nav">
    <button class="stab active" data-sub="or1">ORDER BY</button>
    <button class="stab" data-sub="or2">LIMIT y OFFSET</button>
    <button class="stab" data-sub="or3">GROUP BY y HAVING</button>
  </div>

  <!-- OR1: ORDER BY -->
  <div class="sub-sec on" id="sub-or1">
    <h2>ORDER BY — Ordenar resultados</h2>
    <p>Ordena los resultados de una consulta según los valores de una o más columnas, en orden <strong>ascendente</strong> (ASC, por defecto) o <strong>descendente</strong> (DESC):</p>
    <pre><span class="lt">sql</span><code><span class="cm">-- Empleados ordenados por salario de mayor a menor</span>
<span class="kw">SELECT</span> <span class="str">"nombre"</span>, <span class="str">"salario"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>
<span class="kw">ORDER BY</span> <span class="str">"salario"</span> <span class="kw">DESC</span>;</code></pre>

    <h2>Ordenar por varias columnas</h2>
    <p>La prioridad es de <strong>izquierda a derecha</strong>: primero ordena por la primera columna y, dentro de cada grupo igual, por la segunda:</p>
    <pre><span class="lt">sql</span><code><span class="cm">-- Por departamento ASC y, dentro de cada uno, por salario DESC</span>
<span class="kw">SELECT</span> <span class="str">"nombre"</span>, <span class="str">"departamento"</span>, <span class="str">"salario"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>
<span class="kw">ORDER BY</span> <span class="str">"departamento"</span> <span class="kw">ASC</span>, <span class="str">"salario"</span> <span class="kw">DESC</span>;</code></pre>

    <h2>ORDER BY combinado con WHERE</h2>
    <pre><span class="lt">sql</span><code><span class="cm">-- Filtrar primero, luego ordenar</span>
<span class="kw">SELECT</span> <span class="str">"nombre"</span>, <span class="str">"salario"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>
<span class="kw">WHERE</span> <span class="str">"salario"</span> > <span class="num">50000</span>
<span class="kw">ORDER BY</span> <span class="str">"salario"</span> <span class="kw">ASC</span>;</code></pre>

    <h2>Orden de ejecución en SQL</h2>
    <p>Es importante entender en qué orden ejecuta SQL cada cláusula, porque explica por qué <strong>no puedes usar un alias del SELECT dentro del WHERE</strong>:</p>
    <div class="table-wrap"><table>
      <thead><tr><th>Paso</th><th>Cláusula</th><th>Qué hace</th></tr></thead>
      <tbody>
        <tr><td>1</td><td><code>FROM</code></td><td>Selecciona la tabla</td></tr>
        <tr><td>2</td><td><code>WHERE</code></td><td>Filtra filas individuales</td></tr>
        <tr><td>3</td><td><code>SELECT</code></td><td>Selecciona columnas y aplica alias</td></tr>
        <tr><td>4</td><td><code>ORDER BY</code></td><td>Ordena los resultados finales</td></tr>
      </tbody>
    </table></div>
    <div class="callout warn">
      <span class="callout-icon">⚠️</span>
      <p>El alias se define en <code>SELECT</code> (paso 3), pero <code>WHERE</code> se ejecuta en el paso 2 — por eso no puede verlo. Este ejemplo genera error:</p>
    </div>
    <pre><span class="lt">sql — ERROR</span><code><span class="cm">-- ❌ El alias "nuevo_salario" no existe aún en el WHERE</span>
<span class="kw">SELECT</span> <span class="str">"salario"</span> * <span class="num">1.1</span> <span class="kw">AS</span> <span class="str">"nuevo_salario"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>
<span class="kw">WHERE</span> <span class="str">"nuevo_salario"</span> > <span class="num">60000</span>;</code></pre>
  </div>

  <!-- OR2: LIMIT y OFFSET -->
  <div class="sub-sec" id="sub-or2">
    <h2>LIMIT — Limitar filas devueltas</h2>
    <p>Restringe el número de filas que devuelve una consulta. Muy útil con grandes conjuntos de datos:</p>
    <pre><span class="lt">sql</span><code><span class="cm">-- Solo las primeras 10 filas</span>
<span class="kw">SELECT</span> <span class="str">"nombre"</span>, <span class="str">"salario"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>
<span class="kw">LIMIT</span> <span class="num">10</span>;</code></pre>

    <h2>LIMIT con ORDER BY</h2>
    <p>La combinación más habitual: ordenar y luego quedarse con los primeros N registros:</p>
    <pre><span class="lt">sql</span><code><span class="cm">-- Top 5 empleados con mayor salario</span>
<span class="kw">SELECT</span> <span class="str">"nombre"</span>, <span class="str">"salario"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>
<span class="kw">ORDER BY</span> <span class="str">"salario"</span> <span class="kw">DESC</span>
<span class="kw">LIMIT</span> <span class="num">5</span>;</code></pre>

    <h2>LIMIT + WHERE + ORDER BY</h2>
    <pre><span class="lt">sql</span><code><span class="cm">-- Top 3 salarios mayores de 50.000</span>
<span class="kw">SELECT</span> <span class="str">"nombre"</span>, <span class="str">"salario"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>
<span class="kw">WHERE</span> <span class="str">"salario"</span> > <span class="num">50000</span>
<span class="kw">ORDER BY</span> <span class="str">"salario"</span> <span class="kw">DESC</span>
<span class="kw">LIMIT</span> <span class="num">3</span>;</code></pre>

    <h2>OFFSET — Saltar filas (paginación)</h2>
    <p>Omite un número de filas antes de empezar a devolver resultados. Ideal para implementar <strong>paginación</strong>:</p>
    <pre><span class="lt">sql</span><code><span class="cm">-- Omite las 10 primeras y devuelve las siguientes 5 (puestos 11-15)</span>
<span class="kw">SELECT</span> <span class="str">"nombre"</span>, <span class="str">"salario"</span>
<span class="kw">FROM</span> <span class="str">"empleados"</span>
<span class="kw">ORDER BY</span> <span class="str">"salario"</span> <span class="kw">DESC</span>
<span class="kw">LIMIT</span> <span class="num">5</span> <span class="kw">OFFSET</span> <span class="num">10</span>;</code></pre>

    <h2>Orden de ejecución completo</h2>
    <div class="table-wrap"><table>
      <thead><tr><th>Paso</th><th>Cláusula</th></tr></thead>
      <tbody>
        <tr><td>1</td><td><code>FROM</code></td></tr>
        <tr><td>2</td><td><code>WHERE</code></td></tr>
        <tr><td>3</td><td><code>SELECT</code></td></tr>
        <tr><td>4</td><td><code>ORDER BY</code></td></tr>
        <tr><td>5</td><td><code>LIMIT</code> y <code>OFFSET</code></td></tr>
      </tbody>
    </table></div>
    <div class="callout tip">
      <span class="callout-icon">✅</span>
      <p>LIMIT y OFFSET se ejecutan al final, sobre el conjunto de datos ya filtrado, ordenado y seleccionado.</p>
    </div>
  </div>

  <!-- OR3: GROUP BY y HAVING -->
  <div class="sub-sec" id="sub-or3">
    <h2>GROUP BY — Agrupar filas</h2>
    <p>Agrupa las filas que tienen el mismo valor en una o más columnas. Es <strong>imprescindible</strong> cuando usas funciones de agregación junto con otras columnas:</p>
    <pre><span class="lt">sql</span><code><span class="cm">-- Número de ventas por producto (solo ventas > 50€)</span>
<span class="kw">SELECT</span> <span class="str">"producto"</span>, <span class="fn">COUNT</span>(*) <span class="kw">AS</span> <span class="str">"num_ventas"</span>
<span class="kw">FROM</span> <span class="str">"ventas"</span>
<span class="kw">WHERE</span> <span class="str">"monto"</span> > <span class="num">50</span>
<span class="kw">GROUP BY</span> <span class="str">"producto"</span>;</code></pre>

    <h2>HAVING — Filtrar grupos</h2>
    <p>Filtra los grupos resultantes del GROUP BY. Es como un WHERE, pero aplicado <strong>después</strong> de la agregación:</p>
    <pre><span class="lt">sql</span><code><span class="cm">-- Solo productos con más de 10 ventas en total</span>
<span class="kw">SELECT</span> <span class="str">"producto"</span>, <span class="fn">COUNT</span>(*) <span class="kw">AS</span> <span class="str">"num_ventas"</span>
<span class="kw">FROM</span> <span class="str">"ventas"</span>
<span class="kw">GROUP BY</span> <span class="str">"producto"</span>
<span class="kw">HAVING</span> <span class="fn">COUNT</span>(*) > <span class="num">10</span>;</code></pre>

    <h2>WHERE vs HAVING</h2>
    <div class="table-wrap"><table>
      <thead><tr><th></th><th>WHERE</th><th>HAVING</th></tr></thead>
      <tbody>
